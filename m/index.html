<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080a">
<title>载堉视界 · Mobile</title>
<link rel="icon" href="../favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--card:#121217;--card2:#1a1a22;--gold:#d4af37;--gold-bright:#f5d574;--gold-pale:#c9a94e;--line:#26262f;--line-gold:rgba(212,175,55,.18);--text-1:#eae6df;--text-2:#b9b4ab;--text-3:#76726c;--green:#4caf72;--red:#e05c5c;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text-1);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-top:var(--safe-top);padding-bottom:calc(60px + var(--safe-bot))}
/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(8,8,10,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.header .logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .status{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:5px}
.header .dot{width:7px;height:7px;border-radius:50%;background:var(--text-3)}
.header .dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.header .dot.loading{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}
/* Bottom Tabs */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(8,8,10,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;padding-bottom:var(--safe-bot)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 6px;color:var(--text-3);font-size:10px;cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--gold-bright)}
.tab .ic{font-size:20px}
/* Views */
.view{display:none;padding:16px;min-height:calc(100vh - 120px)}
.view.active{display:block}
/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.card.gold-edge{border-color:var(--line-gold)}
/* Market grid */
.mkt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.mkt-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.mkt-card .lbl{font-size:11px;color:var(--text-3);margin-bottom:4px}
.mkt-card .val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700}
.mkt-card .chg{font-family:'JetBrains Mono',monospace;font-size:12px;margin-top:2px}
.up{color:var(--green)}.dn{color:var(--red)}
/* Section title */
.sec-t{font-size:16px;font-weight:700;color:var(--text-1);margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.sec-t::before{content:'';width:3px;height:16px;border-radius:2px;background:var(--gold)}
/* CB list */
.cb-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
.cb-item:last-child{border:none}
.cb-flag{font-size:22px}
.cb-info{flex:1}
.cb-name{font-size:13px;font-weight:600}
.cb-rate{font-size:11px;color:var(--gold-pale)}
.cb-next{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-2);text-align:right}
/* Cycle */
.cyc-card{padding:16px}
.cyc-nm{font-size:15px;font-weight:700;margin-bottom:4px}
.cyc-en{font-size:11px;color:var(--text-3);margin-bottom:8px}
.cyc-bar{height:6px;background:var(--line);border-radius:3px;margin:8px 0;overflow:hidden}
.cyc-bar .fill{height:100%;border-radius:3px;transition:width .6s}
.cyc-pos{font-size:12px;color:var(--text-2)}
.cyc-phase{font-size:11px;font-weight:600;margin-top:4px}
/* Masters */
.m-card{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.m-card:active{background:rgba(212,175,55,.05)}
.m-av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid var(--line-gold)}
.m-nm{font-size:15px;font-weight:700}
.m-en{font-size:10px;color:var(--text-3)}
.m-style{font-size:11px;color:var(--gold-pale);margin-top:2px}
.m-arrow{color:var(--text-3);font-size:16px;margin-left:auto}
/* Master Detail */
.md-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gold-bright);margin-bottom:16px;cursor:pointer}
.md-hdr{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.md-hdr .av{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;border:1px solid var(--line-gold)}
.md-hdr .nm{font-size:20px;font-weight:700}
.md-hdr .en{font-size:11px;color:var(--text-3)}
.md-hdr .ti{font-size:12px;color:var(--gold-pale)}
.md-philo{font-size:13px;color:var(--text-2);line-height:1.8;padding:14px 16px;border-left:3px solid var(--gold);background:rgba(212,175,55,.04);border-radius:0 12px 12px 0;margin-bottom:20px}
.md-case{border-left:3px solid var(--gold);padding:14px 16px;margin-bottom:14px}
.md-case .yr{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold-bright);font-weight:700}
.md-case .nm{font-size:15px;font-weight:700;margin:4px 0 8px}
.md-case .row{font-size:12px;color:var(--text-2);margin-bottom:6px;line-height:1.6}
.md-case .row b{color:var(--gold);font-weight:600}
.md-case .lesson{font-size:11px;color:var(--text-3);font-style:italic;background:rgba(212,175,55,.05);padding:8px 12px;border-radius:8px;margin-top:8px;line-height:1.6}
/* Stocks */
.stk-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer;-webkit-tap-highlight-color:transparent}
.stk-item:active{background:rgba(212,175,55,.03)}
.stk-name{flex:1}
.stk-name .code{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.stk-name .cn{font-size:11px;color:var(--text-3)}
.stk-price{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;text-align:right;min-width:70px}
.stk-chg{font-family:'JetBrains Mono',monospace;font-size:12px;text-align:right;min-width:60px;padding:3px 8px;border-radius:6px}
.stk-chg.up{background:rgba(76,175,114,.15)}.stk-chg.dn{background:rgba(224,92,92,.15)}
/* Stock Detail */
.sd-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gold-bright);margin-bottom:12px;cursor:pointer}
.sd-hdr{margin-bottom:16px}
.sd-hdr .nm{font-size:20px;font-weight:700}
.sd-hdr .price{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;margin:4px 0}
.sd-hdr .chg{font-family:'JetBrains Mono',monospace;font-size:14px}
.sd-chart{background:var(--card);border-radius:12px;padding:12px;margin-bottom:16px;overflow-x:auto}
.sd-fund{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sd-fund .item{text-align:center;padding:10px 8px;background:var(--card);border-radius:10px;border:1px solid var(--line)}
.sd-fund .item .v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--gold-bright)}
.sd-fund .item .l{font-size:10px;color:var(--text-3);margin-top:3px}
/* Crisis */
.cmp-card{padding:14px 16px;margin-bottom:10px}
.cmp-dim{font-size:14px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.cmp-h{font-size:11px;color:var(--text-3);margin-bottom:4px}
.cmp-cur{font-size:12px;color:var(--text-2);margin-bottom:6px}
.cmp-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.cmp-bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--gold),var(--red))}
.cmp-sim{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold-bright);margin-top:4px}
/* Score badge */
.score-badge{text-align:center;padding:20px;margin-bottom:16px;background:var(--card);border:1px solid var(--line-gold);border-radius:16px}
.score-badge .num{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;background:linear-gradient(135deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-badge .lbl{font-size:12px;color:var(--text-3);margin-top:4px}
/* Subtabs */
.stabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.stab{font-size:12px;font-weight:600;color:var(--text-3);background:var(--card);border:1px solid var(--line);border-radius:20px;padding:8px 16px;white-space:nowrap;cursor:pointer;flex-shrink:0}
.stab.active{color:#08080a;background:linear-gradient(120deg,var(--gold-bright),var(--gold));border-color:transparent}
/* Loading */
.loading-box{text-align:center;padding:40px;color:var(--text-3)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* Disclaimer */
.disclaimer{font-size:10px;color:var(--text-3);padding:16px 0;margin-top:20px;border-top:1px solid var(--line);line-height:1.6}
/* PC link */
.pc-link{display:block;text-align:center;font-size:11px;color:var(--text-3);padding:12px;text-decoration:none}
.pc-link:hover{color:var(--gold)}
/* Truth check */
.tc-card{padding:12px 16px;margin-bottom:10px;border-left:3px solid var(--gold)}
.tc-item{font-size:13px;font-weight:600;margin-bottom:4px}
.tc-verdict{font-size:12px;font-weight:700;margin-bottom:4px}
.tc-reason{font-size:11px;color:var(--text-3);line-height:1.6}
/* Advice cards */
.adv-card{padding:14px 16px;margin-bottom:12px;border-top:2px solid var(--gold)}
.adv-nm{font-size:14px;font-weight:700;margin-bottom:2px}
.adv-stance{font-size:12px;font-weight:600;margin-bottom:8px}
.adv-logic{font-size:12px;color:var(--text-2);margin-bottom:8px;line-height:1.6}
.adv-port{font-size:11px;color:var(--gold-pale);background:rgba(212,175,55,.05);padding:8px 12px;border-radius:8px;line-height:1.5}
</style>
</head>
<body>
<div class="header">
  <div class="logo">载堉视界</div>

<div class="view active" id="v-dash"></div>

<nav class="tabs">

<script>
/* ===== CONFIG ===== */
const EM_BASE="https://push2.eastmoney.com/api/qt/ulist.np/get";

function nf(n,d){return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}
function chgStr(c){return c==null?'—':(c>=0?'+':'')+Number(c).toFixed(2)+'%'}

/* ===== CACHE ===== */
const _cache={};
function cacheGet(k,ttl){const e=_cache[k];return e&&Date.now()-e.t<ttl?e.v:null}
function cacheSet(k,v){_cache[k]={v,t:Date.now()}}

async function emQuote(secids){

  const c=new AbortController();const t=setTimeout(()=>c.abort(),8000);
  try{const r=await fetch(url,{signal:c.signal});const j=await r.json();clearTimeout(t);

  {flag:'🇬🇧',name:'英格兰银行 BOE',rate:'3.75%',meetings:['2026-02-05','2026-03-19','2026-05-07','2026-06-18','2026-08-06','2026-09-17','2026-11-05','2026-12-17']},
  {flag:'🇨🇦',name:'加拿大央行 BOC',rate:'2.50%',meetings:['2026-01-28','2026-03-11','2026-04-15','2026-06-03','2026-07-29','2026-09-16','2026-10-28','2026-12-09']},
  {flag:'🇦🇺',name:'澳洲联储 RBA',rate:'3.60%',meetings:['2026-02-03','2026-03-31','2026-05-05','2026-06-16','2026-08-11','2026-09-29','2026-11-03','2026-12-08']},
  {flag:'🇨🇭',name:'瑞士央行 SNB',rate:'0.25%',meetings:['2026-03-19','2026-06-18','2026-09-24','2026-12-17']},
];
function nextMeeting(b){
  const today=new Date();today.setHours(0,0,0,0);let next=null;
  if(b.monthlyDay){next=new Date(today.getFullYear(),today.getMonth(),b.monthlyDay);if(next<today)next=new Date(today.getFullYear(),today.getMonth()+1,b.monthlyDay);}
  else if(b.meetings){for(const s of b.meetings){const dt=new Date(s+'T00:00:00');if(dt>=today){next=dt;break;}}}
  if(!next)return'待公布';const days=Math.round((next-today)/86400000);
  return `${next.getMonth()+1}/${next.getDate()} · ${days===0?'今日':days+'天后'}`;
}

  {nm:'朱格拉周期',en:'Juglar',dur:'7-11年',pos:'AI驱动CAPEX上升(2024-2028)',phase:'上升期',pc:'#4caf72',prog:35},

];

/* ===== MASTERS ===== */
const MASTERS=[

{year:2008,name:'金融危机逆势暴赚',entry:'模型捕捉极端波动中的回归和动量信号',result:'2008年回报约80%',lesson:'量化系统在极端行情表现更好'},
{year:2000,name:'互联网泡沫中获利',entry:'只捕捉统计异常，快速切换多空',result:'2000年回报98.5%',lesson:'不依赖市场方向从短期波动提取alpha'}]},

/* ===== COMPARE (Crisis 1999 vs 2026) ===== */
const COMPARE_DIMS=[
  {dim:'美股走势',ic:'📈',sim:80,h:'1999标普+19.5%/纳指+85.6%',cur:'AI牛市续创新高'},
  {dim:'盈利与估值',ic:'💰',sim:82,h:'CAPE 44(史上峰值)',cur:'CAPE~39·前瞻PE~22'},
  {dim:'长中短期利率',ic:'🏦',sim:42,h:'联邦基金6.5%·深度倒挂',cur:'联邦基金3.50-3.75%·曲线已转正'},
  {dim:'美元走势',ic:'💵',sim:66,h:'DXY升向110',cur:'DXY偏强~99'},
  {dim:'黄金走势',ic:'🥇',sim:8,h:'低迷~$280/oz',cur:'创历史新高$4500+'},
  {dim:'石油价格',ic:'🛢️',sim:60,h:'$12→$35(+192%)',cur:'WTI高位坚挺'},
  {dim:'PCE/CPI',ic:'🌡️',sim:58,h:'CPI 3.4%·PCE 1.7%',cur:'CPI~3.3%·PCE~2.7%'},
  {dim:'企业基本面',ic:'🏭',sim:24,h:'多数互联网公司负现金流',cur:'Mag7高盈利强现金流'},
];
function overlapScore(){
  const sims=COMPARE_DIMS.map(d=>d.sim);
  const sorted=[...sims].sort((a,b)=>a-b);
  const q=p=>{const i=(sorted.length-1)*p,lo=Math.floor(i),hi=Math.ceil(i);return sorted[lo]+(sorted[hi]-sorted[lo])*(i-lo)};
  const med=q(.5),iqr=q(.75)-q(.25),thr=Math.max(iqr,12);
  const kept=COMPARE_DIMS.filter(d=>Math.abs(d.sim-med)<=thr);
  const raw=Math.round(sims.reduce((a,b)=>a+b,0)/sims.length);
  const trimmed=Math.round(kept.reduce((a,b)=>a+b.sim,0)/kept.length);
  return{raw,trimmed,kept:kept.length,total:sims.length};
}

  const html=CYCLES.map(c=>`<div class="card cyc-card gold-edge"><div class="cyc-nm">${c.nm}</div><div class="cyc-en">${c.en} · ${c.dur}</div><div class="cyc-bar"><div class="fill" style="width:${c.prog}%;background:${c.pc}"></div></div><div class="cyc-pos">${c.pos}</div><div class="cyc-phase" style="color:${c.pc}">${c.phase} · ${c.prog}%</div></div>`).join('');
  document.getElementById('v-cycle').innerHTML=`<div class="sec-t">经济周期定位</div>${html}<div class="disclaimer"><b>风险提示</b> · 周期定位为主观研判，不构成投资建议。</div>`;
}

/* ===== RENDER: MASTERS ===== */
let masterView='list';
function renderMastersList(){
  const html=MASTERS.map(m=>`<div class="card m-card gold-edge" onclick="showMDetail('${m.id}')"><div class="m-av" style="background:${m.c}22;color:${m.c}">${m.av}</div><div><div class="m-nm">${m.nm}</div><div class="m-en">${m.en}</div><div class="m-style">${m.style}</div></div><div class="m-arrow">›</div></div>`).join('');
  document.getElementById('v-masters').innerHTML=`<div class="sec-t">十位投研大师</div>${html}<div class="disclaimer"><b>风险提示</b> · 大师逻辑仅供学习参考。</div>`;
}
function showMDetail(id){
  const m=MASTERS.find(x=>x.id===id);if(!m)return;
  const mc=MASTER_CASES[id];if(!mc)return;
  const casesHTML=mc.cases.map(c=>`<div class="card md-case gold-edge"><div class="yr">${c.year}</div><div class="nm">${c.name}</div><div class="row"><b>入场▸ </b>${c.entry}</div><div class="row"><b>结果▸ </b>${c.result}</div><div class="lesson">💡 ${c.lesson}</div></div>`).join('');
  document.getElementById('v-masters').innerHTML=`
    <div class="md-back" onclick="renderMastersList()">← 返回</div>
    <div class="md-hdr"><div class="av" style="background:${m.c}22;color:${m.c}">${m.av}</div><div><div class="nm">${m.nm}</div><div class="en">${m.en}</div><div class="ti">${m.title}</div></div></div>
    <div class="sec-t">核心交易哲学</div>
    <div class="card md-philo gold-edge">${mc.philosophy}</div>
    <div class="sec-t">经典案例</div>${casesHTML}`;
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ===== RENDER: STOCKS ===== */
let stockView='list';
function renderStockList(data){
  const renderSection=(title,list)=>{
    const items=list.map(s=>{
      const cls=s.changePct>=0?'up':'dn';
      const priceStr=s.price!=null?s.price.toLocaleString():'—';
      return `<div class="stk-item" onclick="showStockDetail('${s.secid}','${s.id}','${s.name}')"><div class="stk-name"><div class="code">${s.id}</div><div class="cn">${s.name}</div></div><div class="stk-price">${priceStr}</div><div class="stk-chg ${cls}">${chgStr(s.changePct)}</div></div>`;
    }).join('');
    return `<div class="sec-t">${title}</div><div class="card gold-edge" style="padding:0 14px">${items}</div>`;
  };
  document.getElementById('v-stocks').innerHTML=
    renderSection('🇺🇸 美股',data.us)+renderSection('🇭🇰 港股',data.hk)+renderSection('🇨🇳 A股',data.cn)+
    `<div class="disclaimer"><b>数据来源</b> · 东方财富 Eastmoney 实时行情</div>`;
}
async function showStockDetail(secid,code,name){
  const el=document.getElementById('v-stocks');
  el.innerHTML=`<div class="sd-back" onclick="reloadStocks()">← 返回列表</div><div class="sd-hdr"><div class="nm">${name} (${code})</div></div><div class="loading-box"><span class="spin"></span> 加载K线…</div>`;
  const [kline,fund]=await Promise.all([fetchKline(secid,120),fetchFundamentals(secid)]);
  // Build SVG K-line
  let chartHTML='<div style="color:var(--text-3);text-align:center;padding:20px">暂无K线数据</div>';
  if(kline.length>10){
    const W=window.innerWidth-64,H=200,pad=4;
    const prices=kline.flatMap(k=>[k.high,k.low]);
    const hi=Math.max(...prices),lo=Math.min(...prices);
    const rng=hi-lo||1;
    const bw=Math.max(2,(W-pad*2)/kline.length-1);
    const yOf=v=>pad+(1-(v-lo)/rng)*(H-pad*2);
    let bars='';
    kline.forEach((k,i)=>{
      const x=pad+i*(bw+1);
      const col=k.close>=k.open?'#4caf72':'#e05c5c';
      const bodyTop=Math.min(k.open,k.close),bodyBot=Math.max(k.open,k.close);
      bars+=`<line x1="${x+bw/2}" y1="${yOf(k.high)}" x2="${x+bw/2}" y2="${yOf(k.low)}" stroke="${col}" stroke-width="1"/>`;
      bars+=`<rect x="${x}" y="${yOf(bodyBot)}" width="${bw}" height="${Math.max(1,yOf(bodyTop)-yOf(bodyBot))}" fill="${col}" rx="1"/>`;
    });
    chartHTML=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${bars}</svg><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-3);margin-top:4px"><span>${kline[0].date}</span><span>120日K线</span><span>${kline[kline.length-1].date}</span></div>`;
  }
  // Fundamentals
  let fundHTML='';
  if(fund){
    const items=[
      {l:'市盈率PE',v:fund.pe!=null?fund.pe:'—'},
      {l:'市净率PB',v:fund.pb!=null?fund.pb:'—'},
      {l:'ROE(%)',v:fund.roe!=null?fund.roe+'%':'—'},
      {l:'总市值',v:fund.mktCap!=null?(fund.mktCap>1e12?(fund.mktCap/1e12).toFixed(1)+'万亿':fund.mktCap>1e8?(fund.mktCap/1e8).toFixed(0)+'亿':fund.mktCap):'—'},
    ];
    fundHTML=`<div class="sec-t">基本面</div><div class="sd-fund">${items.map(i=>`<div class="item"><div class="v">${i.v}</div><div class="l">${i.l}</div></div>`).join('')}</div>`;
  }
  el.innerHTML=`<div class="sd-back" onclick="reloadStocks()">← 返回列表</div><div class="sd-hdr"><div class="nm">${name} (${code})</div></div><div class="sd-chart">${chartHTML}</div>${fundHTML}`;
}
async function reloadStocks(){
  const el=document.getElementById('v-stocks');
  el.innerHTML='<div class="loading-box"><span class="spin"></span> 加载行情…</div>';
  try{const d=await fetchUniverse();renderStockList(d);}catch(e){el.innerHTML='<div class="loading-box">行情加载失败，请稍后重试</div>';}
}

/* ===== APP CONTROL ===== */
const views=['dash','crisis','cycle','masters','stocks'];
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  const v=t.dataset.v;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  // Lazy render
  if(v==='crisis'&&!document.getElementById('v-crisis').innerHTML)renderCrisis();
  if(v==='cycle'&&!document.getElementById('v-cycle').innerHTML)renderCycles();
  if(v==='masters'&&!document.getElementById('v-masters').innerHTML)renderMastersList();
  if(v==='stocks'&&!document.getElementById('v-stocks').innerHTML)reloadStocks();
  window.scrollTo({top:0,behavior:'smooth'});
}));

function setStatus(state,txt){
  document.getElementById('statusDot').className='dot '+state;
  document.getElementById('statusText').textContent=txt;
}

async function loadAll(){
  setStatus('loading','加载中…');
  const md=Object.assign({},CURATED);
  try{
    const [fx,mkt]=await Promise.allSettled([fetchFX(),fetchMarket()]);
    if(fx.status==='fulfilled')Object.assign(md,fx.value);
    if(mkt.status==='fulfilled')Object.assign(md,mkt.value);
    renderDash(md);
    const ts=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    setStatus('live','实时 · '+ts);
  }catch(e){
    renderDash(md);
    setStatus('','离线');
  }
}
loadAll();
setInterval(loadAll,300000);
</script>
