<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080a">
<title>载堉视界 · Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--card:#121217;--card2:#1a1a22;--panel:#16171e;--gold:#d4af37;--gold-bright:#f5d574;--gold-deep:#b8860b;--gold-pale:#c9a94e;--line:#26262f;--line-gold:rgba(212,175,55,.18);--text:#f3eede;--text-1:#eae6df;--text-2:#b9b4ab;--text-3:#76726c;--green:#4caf72;--red:#e05c5c;--blue:#5b9bd5;--orange:#e0a23c;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text-1);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-top:var(--safe-top);padding-bottom:calc(56px + var(--safe-bot))}
/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(8,8,10,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.header .logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .status{font-size:10px;color:var(--text-3);display:flex;align-items:center;gap:5px}
.header .dot{width:6px;height:6px;border-radius:50%;background:var(--text-3)}
.header .dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.header .dot.loading{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}
/* Bottom Tabs */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(8,8,10,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;padding-bottom:var(--safe-bot)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 5px;color:var(--text-3);font-size:9px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:.2s}
.tab.active{color:var(--gold-bright)}
.tab .ic{font-size:18px}
/* Views */
.view{display:none;padding:14px;min-height:calc(100vh - 110px)}
.view.active{display:block}
/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.card.gold-edge{border-color:var(--line-gold)}
/* Section title */
.sec-t{font-size:15px;font-weight:700;color:var(--text-1);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec-t::before{content:'';width:3px;height:14px;border-radius:2px;background:var(--gold)}
.sec-t .cnt{font-size:10px;color:var(--text-3);font-weight:400;margin-left:auto}
/* Market grid */
.mkt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.mkt-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.mkt-card .lbl{font-size:10px;color:var(--text-3);margin-bottom:3px}
.mkt-card .val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}
.mkt-card .chg{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:2px}
.up{color:var(--green)}.dn{color:var(--red)}
/* Sentiment */
.sent-box{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:14px;border:1px solid var(--line-gold)}
.sent-emoji{font-size:28px}
.sent-label{font-size:16px;font-weight:700}
.sent-desc{font-size:11px;color:var(--text-3)}
/* Calendar */
.cal-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);font-size:12px}
.cal-row:last-child{border:none}
.cal-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);min-width:40px}
.cal-flag{font-size:16px}
.cal-ev{flex:1;font-size:12px}
.cal-imp{font-size:10px}
/* Central Banks */
.cb-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.cb-item:last-child{border:none}
.cb-flag{font-size:20px}
.cb-info{flex:1}
.cb-name{font-size:12px;font-weight:600}
.cb-rate{font-size:11px;color:var(--gold-pale)}
.cb-next{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-2);text-align:right}
/* Cycle */
.cyc-card{padding:14px}
.cyc-nm{font-size:14px;font-weight:700;margin-bottom:3px}
.cyc-en{font-size:10px;color:var(--text-3);margin-bottom:6px}
.cyc-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin:6px 0}
.cyc-bar .fill{height:100%;border-radius:3px}
.cyc-pos{font-size:11px;color:var(--text-2)}
.cyc-phase{font-size:11px;font-weight:600;margin-top:3px}
/* Masters */
.m-card{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.m-card:active{background:rgba(212,175,55,.05)}
.m-av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--line-gold)}
.m-nm{font-size:14px;font-weight:700}
.m-en{font-size:9px;color:var(--text-3)}
.m-style{font-size:10px;color:var(--gold-pale);margin-top:1px}
.m-arrow{color:var(--text-3);font-size:14px;margin-left:auto}
/* Master Detail */
.md-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gold-bright);margin-bottom:14px;cursor:pointer}
.md-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.md-hdr .av{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid var(--line-gold)}
.md-hdr .nm{font-size:18px;font-weight:700}
.md-hdr .en{font-size:10px;color:var(--text-3)}
.md-hdr .ti{font-size:11px;color:var(--gold-pale)}
.md-philo{font-size:12px;color:var(--text-2);line-height:1.7;padding:12px 14px;border-left:3px solid var(--gold);background:rgba(212,175,55,.04);border-radius:0 10px 10px 0;margin-bottom:16px}
.md-case{border-left:3px solid var(--gold);padding:12px 14px;margin-bottom:12px}
.md-case .yr{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold-bright);font-weight:700}
.md-case .nm{font-size:14px;font-weight:700;margin:3px 0 6px}
.md-case .row{font-size:11px;color:var(--text-2);margin-bottom:4px;line-height:1.5}
.md-case .row b{color:var(--gold);font-weight:600}
.md-case .lesson{font-size:10px;color:var(--text-3);font-style:italic;background:rgba(212,175,55,.05);padding:6px 10px;border-radius:6px;margin-top:6px;line-height:1.5}
/* Sub-tabs */
.stabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:3px}
.stab{font-size:11px;font-weight:600;color:var(--text-3);background:var(--card);border:1px solid var(--line);border-radius:18px;padding:7px 14px;white-space:nowrap;cursor:pointer;flex-shrink:0}
.stab.active{color:#08080a;background:linear-gradient(120deg,var(--gold-bright),var(--gold));border-color:transparent}
/* Score badge */
.score-badge{text-align:center;padding:18px;margin-bottom:14px;background:var(--card);border:1px solid var(--line-gold);border-radius:14px}
.score-badge .num{font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:700;background:linear-gradient(135deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-badge .lbl{font-size:11px;color:var(--text-3);margin-top:4px}
/* Crisis compare */
.cmp-card{padding:12px 14px;margin-bottom:8px}
.cmp-dim{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.cmp-h{font-size:10px;color:var(--text-3);margin-bottom:3px}
.cmp-cur{font-size:11px;color:var(--text-2);margin-bottom:5px}
.cmp-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.cmp-bar .fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--gold),var(--red))}
.cmp-sim{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold-bright);margin-top:3px}
/* Anomaly */
.ano-card{padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--gold)}
.ano-card.danger{border-left-color:var(--red)}
.ano-card.warn{border-left-color:var(--orange)}
.ano-card.safe{border-left-color:var(--green)}
.ano-metric{font-size:12px;font-weight:700;margin-bottom:4px}
.ano-detail{font-size:11px;color:var(--text-2);line-height:1.5}
/* Truth check */
.tc-card{padding:10px 14px;margin-bottom:8px;border-left:3px solid var(--gold)}
.tc-item{font-size:12px;font-weight:600;margin-bottom:3px}
.tc-verdict{font-size:11px;font-weight:700;margin-bottom:3px}
.tc-reason{font-size:10px;color:var(--text-3);line-height:1.5}
/* Advice */
.adv-card{padding:12px 14px;margin-bottom:10px;border-top:2px solid var(--gold)}
.adv-nm{font-size:13px;font-weight:700;margin-bottom:2px}
.adv-stance{font-size:11px;font-weight:600;margin-bottom:6px}
.adv-port{font-size:10px;color:var(--gold-pale);background:rgba(212,175,55,.05);padding:6px 10px;border-radius:6px;line-height:1.4}
/* Scenario */
.scen-card{padding:14px;margin-bottom:10px;border-top:2px solid var(--gold)}
.scen-prob{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:800}
.scen-lbl{font-size:14px;font-weight:700;margin:2px 0 6px}
.scen-sum{font-size:12px;color:var(--text-2);margin-bottom:8px;line-height:1.5}
.scen-driv{font-size:11px;color:var(--text-3);margin-bottom:3px;padding-left:12px;position:relative}
.scen-driv::before{content:'▸';position:absolute;left:0;color:var(--gold)}
/* Camps */
.camp-card{padding:14px;margin-bottom:12px;border-top:2px solid var(--blue)}
.camp-nm{font-size:16px;font-weight:700;margin-bottom:2px}
.camp-en{font-size:10px;color:var(--text-3);margin-bottom:8px}
.camp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.camp-stat{text-align:center}
.camp-stat .v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.camp-stat .l{font-size:9px;color:var(--text-3)}
.camp-chars{font-size:11px;color:var(--text-2);line-height:1.6;margin-bottom:8px}
.camp-chars .c{margin-bottom:2px}
.camp-flags{font-size:18px;letter-spacing:4px;margin-bottom:6px}
.camp-dyn{font-size:10px;color:var(--text-3);line-height:1.5}
.flow-item,.tech-item{font-size:11px;color:var(--text-2);padding:6px 0;border-bottom:1px solid var(--line);line-height:1.4}
.flow-item:last-child,.tech-item:last-child{border:none}
/* Stocks */
.stk-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer;-webkit-tap-highlight-color:transparent}
.stk-item:active{background:rgba(212,175,55,.03)}
.stk-name{flex:1}
.stk-name .code{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
.stk-name .cn{font-size:10px;color:var(--text-3)}
.stk-price{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;text-align:right;min-width:60px}
.stk-chg{font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right;min-width:55px;padding:2px 6px;border-radius:5px}
.stk-chg.up{background:rgba(76,175,114,.15)}.stk-chg.dn{background:rgba(224,92,92,.15)}
/* Stock Detail */
.sd-back{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gold-bright);margin-bottom:10px;cursor:pointer}
.sd-hdr{margin-bottom:14px}
.sd-hdr .nm{font-size:18px;font-weight:700}
.sd-hdr .price{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;margin:3px 0}
.sd-hdr .chg{font-family:'JetBrains Mono',monospace;font-size:13px}
.sd-rt-price{display:flex;align-items:baseline;gap:10px;padding:10px 0 6px}
.sd-rt-price .price{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700}
.sd-rt-price .chg{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}
.sd-rt-price .prev{font-size:11px;color:var(--text-3);margin-left:4px}
.sd-rt-price.up .price,.sd-rt-price.up .chg{color:var(--red)}
.sd-rt-price.down .price,.sd-rt-price.down .chg{color:var(--green)}
.sd-rt-price.flat .price,.sd-rt-price.flat .chg{color:var(--text-2)}
.sd-chart{background:var(--card);border-radius:10px;padding:10px;margin-bottom:14px;overflow-x:auto}
.sd-fund{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.sd-fund .item{text-align:center;padding:8px 6px;background:var(--card);border-radius:8px;border:1px solid var(--line)}
.sd-fund .item .v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--gold-bright)}
.sd-fund .item .l{font-size:9px;color:var(--text-3);margin-top:2px}
/* AI Score */
.ai-box{padding:14px;margin-bottom:14px}
.ai-overall{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.ai-score{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:800}
.ai-verdict{font-size:14px;font-weight:700}
.ai-dim{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-lbl{font-size:10px;color:var(--text-2);width:60px;flex-shrink:0}
.ai-bar{flex:1;height:6px;border-radius:3px;background:var(--line);overflow:hidden}
.ai-fill{height:100%;border-radius:3px}
.ai-pct{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--text-2);width:24px;text-align:right}
.ai-meta{margin-top:10px;font-size:10px;color:var(--text-3);border-top:1px dashed var(--line);padding-top:8px}
/* Master Framework in stock detail */
.mf-signal{display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;margin-bottom:14px;border:1px solid var(--line-gold)}
.mf-signal.buy{background:rgba(76,175,114,.08);border-color:rgba(76,175,114,.4)}
.mf-signal.sell{background:rgba(224,92,92,.08);border-color:rgba(224,92,92,.4)}
.mf-signal.hold{background:rgba(212,175,55,.06);border-color:rgba(212,175,55,.3)}
.mf-signal-icon{font-size:26px}
.mf-signal-text{flex:1}
.mf-signal-label{font-size:15px;font-weight:800}
.mf-signal-desc{font-size:10px;color:var(--text-2)}
.mf-signal-score{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800}
.mf-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:14px}
.mf-card{padding:12px;border-radius:8px;background:var(--panel);border:1px solid var(--line)}
.mf-card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mf-card-av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
.mf-card-nm{font-size:12px;font-weight:700}
.mf-card-style{font-size:9px;color:var(--text-3)}
.mf-card-signal{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.mf-card-signal .tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.mf-card-signal .tag.buy{background:rgba(76,175,114,.15);color:#4caf72}
.mf-card-signal .tag.sell{background:rgba(224,92,92,.15);color:#e05c5c}
.mf-card-signal .tag.hold{background:rgba(212,175,55,.12);color:#e0a23c}
.mf-card-signal .score{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.mf-card-reasons{font-size:10px;color:var(--text-2);line-height:1.5}
.mf-card-reasons .r{margin-bottom:2px;padding-left:8px;position:relative}
.mf-card-reasons .r::before{content:'▸';position:absolute;left:0;color:var(--gold);font-size:9px}
.mf-cycle{padding:14px;border-radius:8px;background:var(--panel);border:1px solid var(--line);margin-bottom:14px}
.mf-cycle-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:10px}
.mf-cycle-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.mf-cycle-item{padding:8px;border-radius:6px;background:rgba(0,0,0,.2);border:1px solid var(--line);font-size:10px}
.mf-cycle-item .lbl{color:var(--text-3);margin-bottom:2px}
.mf-cycle-item .val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
/* Fibonacci */
.fib-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px}
.fib-pct{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-2);width:40px}
.fib-price{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;flex:1}
.fib-dist{font-family:'JetBrains Mono',monospace;font-size:10px;width:45px;text-align:right}
.fib-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.fib-tag{font-size:9px;padding:2px 8px;border-radius:3px;font-weight:600}
.fib-tag.support{background:rgba(76,175,114,.12);color:#4caf72}
.fib-tag.resist{background:rgba(224,92,92,.12);color:#e05c5c}
/* KB */
.kb-stat{text-align:center;padding:10px;border-radius:8px;background:var(--card);border:1px solid var(--line)}
.kb-stat .v{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--gold-bright)}
.kb-stat .l{font-size:9px;color:var(--text-3);margin-top:2px}
.kb-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.kb-card{padding:12px;margin-bottom:8px}
.kb-card .ct{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:4px}
.kb-card .cd{font-size:11px;color:var(--text-2);line-height:1.5;margin-bottom:6px}
.kb-card .cq{font-size:10px;color:var(--text-3);font-style:italic}
.tl-item{padding:10px 12px;margin-bottom:8px;border-left:2px solid var(--gold)}
.tl-item .tl-yr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold-bright)}
.tl-item .tl-k{font-size:11px;color:var(--text-2);margin-top:4px;line-height:1.4}
/* Loading & misc */
.loading-box{text-align:center;padding:30px;color:var(--text-3)}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.disclaimer{font-size:9px;color:var(--text-3);padding:14px 0;margin-top:16px;border-top:1px solid var(--line);line-height:1.5}
.pc-link{display:block;text-align:center;font-size:10px;color:var(--text-3);padding:10px;text-decoration:none}
.kline-svg{display:block;width:100%;height:auto;min-width:300px}
.sum-item{font-size:11px;padding:6px 0;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
.sum-item:last-child{border:none}
.sum-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* Hedge Fund - AI对冲建议 */
.hf-hero{text-align:center;padding:14px 0 16px}
.hf-hero h2{font-size:17px;font-weight:800;color:var(--gold)}
.hf-hero p{font-size:10px;color:var(--text-3);margin-top:5px;line-height:1.5}
.hf-actions{display:flex;justify-content:center;gap:10px;margin-top:12px}
.hf-btn{padding:8px 20px;border-radius:8px;border:1px solid var(--gold);background:rgba(212,175,55,.1);color:var(--gold-bright);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.hf-btn:active{background:rgba(212,175,55,.25)}
.hf-progress{margin-top:12px;padding:0 10px}
.hf-progress .bar{height:5px;border-radius:3px;background:var(--card);overflow:hidden;margin-top:5px}
.hf-progress .bar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));border-radius:3px;transition:width .3s;width:0}
.hf-progress .lbl{font-size:10px;color:var(--text-3)}

// 动态推算下一次议息: 返回 "M月D日 (N天后)"; 央行月度型(中国LPR)按每月固定日推算
function nextMeeting(b){
  const today=new Date(); today.setHours(0,0,0,0);
  let next=null;
  if(b.monthlyDay){
    next=new Date(today.getFullYear(),today.getMonth(),b.monthlyDay);
    if(next<today) next=new Date(today.getFullYear(),today.getMonth()+1,b.monthlyDay);
  }else if(b.meetings){
    for(const s of b.meetings){const dt=new Date(s+'T00:00:00'); if(dt>=today){next=dt;break;}}
  }
  if(!next) return '待公布';
  const days=Math.round((next-today)/86400000);
  return `${next.getMonth()+1}月${next.getDate()}日 · ${days===0?'今日':days+'天后'}`;
}

// 总体重合度: 去掉偏离中位数 >1×IQR 的异常维度后再取均值
function overlapScore(){
  const dims=COMPARE_DIMS.filter(d=>d.sim!=null);
  const sims=dims.map(d=>d.sim);
  const sorted=[...sims].sort((a,b)=>a-b);
  const q=p=>{const i=(sorted.length-1)*p,lo=Math.floor(i),hi=Math.ceil(i);return sorted[lo]+(sorted[hi]-sorted[lo])*(i-lo)};
  const med=q(.5),iqr=q(.75)-q(.25),thr=Math.max(iqr,12);
  const kept=dims.filter(d=>Math.abs(d.sim-med)<=thr);
  const removed=dims.filter(d=>Math.abs(d.sim-med)>thr);
  const raw=Math.round(sims.reduce((a,b)=>a+b,0)/sims.length);
  const trimmed=Math.round(kept.reduce((a,b)=>a+b.sim,0)/kept.length);
  return {raw,trimmed,removed,kept:kept.length,total:dims.length,med:Math.round(med),iqr:Math.round(iqr)};
}

// 计算综合相似度
// 综合相似度: IQR 法剔除偏离过大的异常维度后再加权平均
// 步骤: 计算各维 sim → 排序取 Q1/Q3 → IQR=Q3-Q1 → 下界=max(Q1-1.5*IQR, 20)
// 排除 sim<下界 的异常项; 若无离群则强制剔除 sim 最低 1 项; 用剩余维度的权重重新归一化
// 综合相似度: 多危机基准加权平均(2000 占 80% + 2008/2020/2022 共占 20%)
// 步骤: 对每个基准计算其 9 维相似度(IQR 剔除异常后加权) → 再按基准权重聚合
function _calcScoreForBenchmark(bubble){
  const items=[];
  CW_DIMENSIONS.forEach(d=>{
    const sim=d.calc(bubble);
    if(sim!=null) items.push({sim,w:d.weight,nm:d.dim});
  });
  if(!items.length) return {trimmed:0,raw:0,removed:[],kept:0,total:0};
  const sorted=[...items.map(x=>x.sim)].sort((a,b)=>a-b);
  const pct=p=>{const i=(sorted.length-1)*p,lo=Math.floor(i),hi=Math.ceil(i);return sorted[lo]+(sorted[hi]-sorted[lo])*(i-lo)};
  const Q1=pct(0.25),Q3=pct(0.75),IQR=Q3-Q1;
  const lowerBound=Math.max(Q1-1.5*IQR,20);
  let kept=items.filter(x=>x.sim>=lowerBound);
  let removed=items.filter(x=>x.sim<lowerBound);
  if(!removed.length && items.length>=4){
    const minSim=Math.min(...items.map(x=>x.sim));
    kept=items.filter(x=>x.sim!==minSim);
    removed=items.filter(x=>x.sim===minSim);
  }
  const totalW=kept.reduce((a,b)=>a+b.w,0)||1;
  const trimmed=Math.round(kept.reduce((a,b)=>a+b.sim*b.w,0)/totalW);
  const raw=Math.round(items.reduce((a,b)=>a+b.sim*b.w,0)/items.reduce((a,b)=>a+b.w,0));
  return {trimmed,raw,removed:removed.map(x=>x.nm),kept:kept.length,total:items.length};
}
function cwCalcScore(){
  // 主维度: 用 2000 基准, IQR 剔除后写入 d.score 供 renderCrisisWarning 渲染
  CW_DIMENSIONS.forEach(d=>{d.score=d.calc(BUBBLE_2000);});
  // 4 个基准各自的 trimmed 相似度
  const perBench=CRISIS_BENCHMARKS.map(b=>{
    const r=_calcScoreForBenchmark(b.bubble);
    return {id:b.id,label:b.label,weight:b.weight,trimmed:r.trimmed,raw:r.raw,removed:r.removed,kept:r.kept,total:r.total};
  });
  // 总综合评分: 2000 占 80%, 其他各占 ~6.67%
  const totalScore=perBench.reduce((a,b)=>a+b.trimmed*b.weight,0);
  // 暴露给渲染层
  cwCalcScore._perBench=perBench;
  const main=perBench.find(p=>p.id==='2000')||perBench[0];
  cwCalcScore._removed=main.removed;
  cwCalcScore._kept=main.kept;
  cwCalcScore._total=main.total;
  cwCalcScore._raw=main.raw;
  return Math.round(totalScore);
}

/* ==================== DATA FETCH (全实时, 无离线回退) ====================
   全部行情 → 东方财富 push2 公开接口(浏览器直连CORS, 国内可访问)
   加密货币 → OKX(国内可访问) → Binance 公共数据(备用)
   取数失败 → 抛错, 由 loadAll 显示加载/错误状态(绝不展示假数据)            */

// 东方财富批量行情: secids 用逗号分隔, 返回 {secid: {price, chg(%), name}}
// 中国大陆浏览器直连, CORS Access-Control-Allow-Origin: *
// ===== 缓存层: 减少重复请求 =====
const _cache=new Map(); // key → {data, ts}
function cacheGet(key,ttlMs){const e=_cache.get(key);if(e&&Date.now()-e.ts<ttlMs)return e.data;return null;}
function cacheSet(key,data){_cache.set(key,{data,ts:Date.now()});}

// ===== JSONP 加载: 通过<script>标签加载东方财富, 完全绕过CORS限制 =====
// 东方财富 push2 原生支持 cb=回调函数名 JSONP 模式, 国内浏览器最稳定
function _emJSONP(url){
  return new Promise((resolve,reject)=>{
    const cbName='__emcb_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const sep=url.includes('?')?'&':'?';
    const fullUrl=url+sep+'cb='+cbName;
    const script=document.createElement('script');
    let done=false;
    const cleanup=()=>{
      done=true;
      try{delete window[cbName];}catch(e){window[cbName]=undefined;}
      if(script.parentNode)script.parentNode.removeChild(script);
      clearTimeout(t);
    };
    const t=setTimeout(()=>{if(!done){cleanup();reject(new Error('JSONP timeout'));}},FETCH_TIMEOUT);
    window[cbName]=(data)=>{if(!done){cleanup();resolve(data);}};
    script.onerror=()=>{if(!done){cleanup();reject(new Error('JSONP script load error'));}};
    script.src=fullUrl;
    (document.head||document.documentElement).appendChild(script);
  });
}

// ===== fetch 后备: 部分场景JSONP被屏蔽时使用 =====
async function _emFetchOnce(url){
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),FETCH_TIMEOUT);
  try{
    const r=await fetch(url,{signal:ctrl.signal,cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } finally { clearTimeout(t); }
}

// 双通道竞速: JSONP 优先(无CORS限制) + fetch 兜底
async function _emFetchRace(directUrl){
  return await Promise.any([
    _emJSONP(directUrl),
    new Promise(r=>setTimeout(r,300)).then(()=>_emFetchOnce(directUrl)),
  ]).catch(agg=>{
    // 全部失败, 抛第一个错误
    throw agg.errors?agg.errors[0]:agg;
  });
}
async function emQuote(secids){
  const ck='eq_'+secids.slice(0,60);
  const cached=cacheGet(ck,20000); // 20s缓存
  if(cached)return cached;
  const baseUrl=`${EM_BASE}?fltt=2&fields=f12,f13,f14,f2,f3&secids=${secids}&_=${Date.now()}`;
  const j=await _emFetchRace(baseUrl);
  const diff=(j.data&&j.data.diff)||[];
  // 不再throw，返回空map让调用方容错处理
  const m={};
  diff.forEach(x=>{ m[x.f13+'.'+x.f12]={
    price:(x.f2!=null&&x.f2!=='-')?Number(x.f2):null,
    chg:(x.f3!=null&&x.f3!=='-')?Number(x.f3):null,
    name:x.f14 }; });
  if(diff.length)cacheSet(ck,m);
  return m;
}

// 人民币四对: 以实时离岸人民币(133.USDCNH, 7×24实时报价)为锚, 用实时交叉汇率换算,
// 比"央行中间价"(每日仅更新一次)更顺畅、更贴近盘面真实价格
const FX_SECIDS='100.UDI,133.USDCNH,119.EURUSD,119.GBPUSD,119.USDJPY';
async function fetchFX(){
  const m=await emQuote(FX_SECIDS);
  const P=sid=>{const x=m[sid]; return (x&&x.price!=null)?Number(x.price):null;};
  const C=sid=>{const x=m[sid]; return (x&&x.chg!=null)?Number(x.chg):null;};
  const usdcnh=P('133.USDCNH'), eurusd=P('119.EURUSD'), gbpusd=P('119.GBPUSD'), usdjpy=P('119.USDJPY');
  const cnhC=C('133.USDCNH')||0, euC=C('119.EURUSD')||0, gbC=C('119.GBPUSD')||0, jpC=C('119.USDJPY')||0;
  // 交叉换算: EUR/CNY=EURUSD×USDCNH; JPY/CNY=USDCNH/USDJPY; GBP/CNY=GBPUSD×USDCNH
  const eurcny=(usdcnh!=null&&eurusd!=null)?eurusd*usdcnh:null;
  const jpycny=(usdcnh!=null&&usdjpy!=null)?usdcnh/usdjpy:null;
  const gbpcny=(usdcnh!=null&&gbpusd!=null)?gbpusd*usdcnh:null;
  return {
    fxDate: new Date().toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit'})+' 实时',
    usdcny:usdcnh!=null?nf(usdcnh,4):null, usdcnyChange:C('133.USDCNH'),
    eurcny:eurcny!=null?nf(eurcny,4):null, eurcnyChange:+(euC+cnhC).toFixed(2),
    jpycny:jpycny!=null?nf(jpycny,4):null, jpycnyChange:+(cnhC-jpC).toFixed(2),
    gbpcny:gbpcny!=null?nf(gbpcny,4):null, gbpcnyChange:+(gbC+cnhC).toFixed(2),
    eurusd:eurusd!=null?nf(eurusd,4):null, eurusdChange:C('119.EURUSD'),
    gbpusd:gbpusd!=null?nf(gbpusd,4):null, gbpusdChange:C('119.GBPUSD'),
    usdjpy:usdjpy!=null?nf(usdjpy,2):null, usdjpyChange:C('119.USDJPY'),
    dxyIndex:P('100.UDI')!=null?nf(P('100.UDI'),2):null, dxyChange:C('100.UDI'),
  };
}

async function fetchCrypto(){
  const ck='crypto';
  const cached=cacheGet(ck,30000); // 30s缓存
  if(cached)return cached;
  const o={};
  // 竞速: OKX + Binance Vision 同时请求, 取最快
  const okxP=(async()=>{
    const [b,e]=await Promise.all([
      fetchJSONq('https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT',4000),
      fetchJSONq('https://www.okx.com/api/v5/market/ticker?instId=ETH-USDT',4000),
    ]);
    const pb=b.data&&b.data[0], pe=e.data&&e.data[0];
    if(!pb||!pe)throw new Error('OKX empty');
    return {btcPrice:nf(+pb.last,0),btcChange:pct(+pb.last,+pb.open24h),eth:nf(+pe.last,0),ethChange:pct(+pe.last,+pe.open24h)};
  })();
  const binP=(async()=>{
    await new Promise(r=>setTimeout(r,300)); // 给OKX 300ms优先窗口
    const arr=await fetchJSONq('https://data-api.binance.vision/api/v3/ticker/24hr?symbols=%5B%22BTCUSDT%22%2C%22ETHUSDT%22%5D',5000);
    const r={};
    arr.forEach(x=>{
      if(x.symbol==='BTCUSDT'){r.btcPrice=nf(+x.lastPrice,0);r.btcChange=Number(x.priceChangePercent);}
      if(x.symbol==='ETHUSDT'){r.eth=nf(+x.lastPrice,0);r.ethChange=Number(x.priceChangePercent);}
    });
    if(!r.btcPrice)throw new Error('Binance empty');
    return r;
  })();
  try{
    const result=await Promise.any([okxP,binP]);
    Object.assign(o,result);
    cacheSet(ck,o);
  }catch(e){}
  return o;
}

// 数据来源: 东方财富push2 API (浏览器直连CORS, 与股票行情同源)
// VIX: 使用VIXY(VIX短期期货ETF)和VXX(iPath VIX ETN)作为CBOE VIX实时代理
// 国债: 直接获取美国2Y/10Y/30Y国债收益率(171.US2Y/US10Y/US30Y)
async function fetchMacro(){
  const ids='107.VIXY,107.VXX,171.US2Y,171.US10Y,171.US30Y';
  const m=await emQuote(ids);
  const o={};
  // --- VIX代理 ---
  const vixy=m['107.VIXY'], vxx=m['107.VXX'];
  if(vixy&&vixy.price!=null){
    // VIXY是VIX短期期货ETF, 价格≈VIX futures水平
    // 历史统计: VIX≈VIXY×1.2 (contango调整系数), 仅供趋势参考
    const vixEst=Math.round(vixy.price*1.2*10)/10;
    o.vixIndex=vixEst;
    o.vixChange=vixy.chg;
    o.vixSource='VIXY×1.2';
    o.vixyPrice=vixy.price;
    o.vixyChangePct=vixy.chg;
  }
  if(vxx&&vxx.price!=null){
    o.vxxPrice=vxx.price;
    o.vxxChangePct=vxx.chg;
    // VXX作为VIX第二代理交叉验证
    if(!o.vixIndex){
      const vixEst2=Math.round(vxx.price*1.1*10)/10;
      o.vixIndex=vixEst2;
      o.vixChange=vxx.chg;
      o.vixSource='VXX×1.1';
    }
  }
  // --- 美国国债收益率 ---
  const us2y=m['171.US2Y'], us10y=m['171.US10Y'], us30y=m['171.US30Y'];
  if(us2y&&us2y.price!=null){ o.t2y=+us2y.price; o.t2yChange=us2y.chg; }
  if(us10y&&us10y.price!=null){ o.t10y=+us10y.price; o.t10yChange=us10y.chg; }
  if(us30y&&us30y.price!=null){ o.t30y=+us30y.price; o.t30yChange=us30y.chg; }
  // --- 计算10Y-2Y利差 ---
  if(o.t2y!=null&&o.t10y!=null){
    o.yieldSpread=+(o.t10y-o.t2y).toFixed(3);
  }
  return o;
}

// ===== 技术指标计算 =====
function calcMA(data,period){
  return data.map((_,i)=>{if(i<period-1)return null;let s=0;for(let j=i-period+1;j<=i;j++)s+=data[j].close;return+(s/period).toFixed(2);});
}
function calcRSI(data,period){
  const rsi=new Array(data.length).fill(null);
  if(data.length<=period)return rsi;
  let gainAvg=0,lossAvg=0;
  for(let i=1;i<=period;i++){const d=data[i].close-data[i-1].close;if(d>0)gainAvg+=d;else lossAvg-=d;}
  gainAvg/=period;lossAvg/=period;
  rsi[period]=lossAvg===0?100:+(100-100/(1+gainAvg/lossAvg)).toFixed(1);
  for(let i=period+1;i<data.length;i++){
    const d=data[i].close-data[i-1].close;
    gainAvg=(gainAvg*(period-1)+Math.max(d,0))/period;
    lossAvg=(lossAvg*(period-1)+Math.max(-d,0))/period;
    rsi[i]=lossAvg===0?100:+(100-100/(1+gainAvg/lossAvg)).toFixed(1);
  }
  return rsi;
}
function calcMACD(data){
  const ema=(arr,p)=>{const r=[arr[0]];const k=2/(p+1);for(let i=1;i<arr.length;i++)r.push(arr[i]*k+r[i-1]*(1-k));return r;};
  const closes=data.map(d=>d.close);
  const e12=ema(closes,12),e26=ema(closes,26);
  const dif=e12.map((v,i)=>+(v-e26[i]).toFixed(3));
  const dea=ema(dif,9);
  const hist=dif.map((v,i)=>+((v-dea[i])*2).toFixed(3));
  return{dif,dea,hist};
}
function calcBoll(data,period,mult){
  return data.map((_,i)=>{
    if(i<period-1)return{mid:null,upper:null,lower:null};
    let s=0,ss=0;for(let j=i-period+1;j<=i;j++){s+=data[j].close;ss+=data[j].close**2;}
    const avg=s/period,std=Math.sqrt(ss/period-avg*avg);
    return{mid:+avg.toFixed(2),upper:+(avg+mult*std).toFixed(2),lower:+(avg-mult*std).toFixed(2)};
  });
}

// ===== 斐波那契回撤计算 =====
function calcFibonacci(data){
  // 找120日内最高点和最低点
  const n=data.length;if(n<20)return null;
  let highIdx=0,lowIdx=0;
  for(let i=0;i<n;i++){if(data[i].high>data[highIdx].high)highIdx=i;if(data[i].low<data[lowIdx].low)lowIdx=i;}
  const high=data[highIdx].high,low=data[lowIdx].low;
  const range=high-low;if(range<0.01)return null;
  const last=data[n-1].close;
  // 判断趋势方向: 高点在低点之后=下跌趋势(从高回撤), 否则=上涨趋势(从低回弹)
  const downTrend=highIdx>lowIdx;
  let levels;
  if(downTrend){
    // 从高点回撤
    levels={
      'r236':+(high-range*0.236).toFixed(2),
      'r382':+(high-range*0.382).toFixed(2),
      'r500':+(high-range*0.500).toFixed(2),
      'r618':+(high-range*0.618).toFixed(2),
      'r786':+(high-range*0.786).toFixed(2),
    };
  }else{
    // 从低点反弹
    levels={
      'r236':+(low+range*0.236).toFixed(2),
      'r382':+(low+range*0.382).toFixed(2),
      'r500':+(low+range*0.500).toFixed(2),
      'r618':+(low+range*0.618).toFixed(2),
      'r786':+(low+range*0.786).toFixed(2),
    };
  }
  // 最大三档回撤价格: 38.2% / 50% / 61.8%
  const retraceLevels=[
    {pct:'38.2%',price:levels.r382},
    {pct:'50.0%',price:levels.r500},
    {pct:'61.8%',price:levels.r618},
  ];
  // 所有关键位(含23.6%和78.6%)用于找支撑/阻力
  const allLevels=[
    {pct:'23.6%',price:levels.r236},
    {pct:'38.2%',price:levels.r382},
    {pct:'50.0%',price:levels.r500},
    {pct:'61.8%',price:levels.r618},
    {pct:'78.6%',price:levels.r786},
  ];
  // 支撑: 当前价下方最近的关键位, 没有则用区间低点
  let nearestSupport=allLevels.filter(l=>l.price<last).sort((a,b)=>b.price-a.price)[0]||null;
  if(!nearestSupport) nearestSupport={pct:'低点',price:low};
  // 阻力: 当前价上方最近的关键位, 没有则用区间高点
  let nearestResist=allLevels.filter(l=>l.price>last).sort((a,b)=>a.price-b.price)[0]||null;
  if(!nearestResist) nearestResist={pct:'高点',price:high};
  // 评分: 价格在关键位附近 → 信号更强
  let fibScore=50;
  const distPct=Math.abs(last-nearestSupport.price)/last*100;
  if(distPct<2)fibScore=70; // 接近支撑=看多
  if(Math.abs(last-nearestResist.price)/last*100<2)fibScore=30; // 接近阻力=看空
  if(downTrend&&last<levels.r618)fibScore=Math.max(fibScore-15,10); // 深度回撤=风险
  if(!downTrend&&last>levels.r618)fibScore=Math.min(fibScore+15,90); // 强势突破
  return{high,low,levels,retraceLevels,nearestSupport,nearestResist,fibScore,downTrend,last};
}

// ===== 主力资金成本线(量价加权均价 VWAP) =====
function calcVWAP(data){
  // 近N日成交量加权平均价(Volume Weighted Average Price)
  let sumPV=0,sumV=0;
  const vwap=data.map((d,i)=>{
    const tp=(d.high+d.low+d.close)/3; // typical price
    sumPV+=tp*d.vol; sumV+=d.vol;
    return sumV>0?+(sumPV/sumV).toFixed(2):null;
  });
  return vwap;
}

// ===== AI 综合评分(5新维度: 技术指标/斐波那契/宏观货币政策/财报基本面/市场情绪) =====
function aiScore(data,fund){
  const n=data.length;if(n<20)return null;
  const last=data[n-1].close,ma5=calcMA(data,5),ma20=calcMA(data,20),rsi=calcRSI(data,14);
  const macd=calcMACD(data);const boll=calcBoll(data,20,2);
  const lastRSI=rsi[n-1]||50,lastMACD=macd.hist[n-1]||0;
  const lastBoll=boll[n-1];
  const ret5=n>=6?(last-data[n-6].close)/data[n-6].close*100:0;
  const ret20=n>=21?(last-data[n-21].close)/data[n-21].close*100:0;
  const fib=calcFibonacci(data);

  // ===== 1. 技术指标 (RSI/MACD/MA/布林/VWAP综合) =====
  let techScore=50;
  // RSI
  if(lastRSI<30)techScore+=12;else if(lastRSI<40)techScore+=6;else if(lastRSI>70)techScore-=12;else if(lastRSI>60)techScore-=6;
  // MACD
  if(lastMACD>0){techScore+=8;if(macd.hist[n-2]<=0)techScore+=5;} // 金叉加分
  else{techScore-=8;if(macd.hist[n-2]>0)techScore-=5;} // 死叉扣分
  // MA金叉/死叉
  if(ma5[n-1]>ma20[n-1])techScore+=6;else techScore-=6;
  // 布林位置
  if(lastBoll&&lastBoll.lower&&last<=lastBoll.lower)techScore+=8; // 触及下轨=超卖
  if(lastBoll&&lastBoll.upper&&last>=lastBoll.upper)techScore-=8; // 触及上轨=超买
  // VWAP位置
  const vwap=calcVWAP(data);
  const lastVWAP=vwap[n-1];
  if(lastVWAP&&last>lastVWAP)techScore+=4; // 在成本线上方=强势
  else if(lastVWAP)techScore-=4;
  techScore=Math.min(100,Math.max(0,techScore));

  // ===== 2. 斐波那契 =====
  const fibScore=fib?fib.fibScore:50;

  // ===== 3. 宏观货币政策 (基于市场环境推断) =====
  // 使用: 长期趋势(60日MA vs 120日均线)作为宏观宽松/紧缩proxy
  let macroScore=50;
  if(n>=60){
    const ma60avg=data.slice(-60).reduce((s,d)=>s+d.close,0)/60;
    const ma30avg=data.slice(-30).reduce((s,d)=>s+d.close,0)/30;
    if(ma30avg>ma60avg*1.05)macroScore=70; // 中期强势=宽松环境
    else if(ma30avg>ma60avg)macroScore=60;
    else if(ma30avg<ma60avg*0.95)macroScore=30; // 中期弱势=紧缩环境
    else macroScore=40;
  }
  // 波动率补充: 近20日波动率高→市场不确定性↑
  const vol20=data.slice(-20);
  const avgClose20=vol20.reduce((s,d)=>s+d.close,0)/vol20.length;
  const stdDev=Math.sqrt(vol20.reduce((s,d)=>s+(d.close-avgClose20)**2,0)/vol20.length);
  const volatility=stdDev/avgClose20*100;
  if(volatility>4)macroScore=Math.max(macroScore-10,10); // 高波动扣分
  macroScore=Math.min(100,Math.max(0,macroScore));

  // ===== 4. 财报基本面 =====
  let fundScore=50;
  if(fund){
    if(fund.pe!=null&&fund.pe>0){
      if(fund.pe<12)fundScore+=18;else if(fund.pe<20)fundScore+=10;else if(fund.pe<30)fundScore+=3;
      else if(fund.pe>60)fundScore-=15;else if(fund.pe>40)fundScore-=8;
    }
    if(fund.roe!=null){
      if(fund.roe>25)fundScore+=12;else if(fund.roe>15)fundScore+=7;else if(fund.roe>8)fundScore+=2;
      else if(fund.roe<3)fundScore-=8;
    }
    if(fund.pb!=null){
      if(fund.pb>0&&fund.pb<1.5)fundScore+=8;else if(fund.pb>5)fundScore-=8;
    }
    if(fund.eps!=null&&fund.eps>0)fundScore+=5;
  }
  fundScore=Math.min(100,Math.max(0,fundScore));

  // ===== 5. 市场情绪 =====
  let sentScore=50;
  // 动量: 近5日涨跌
  sentScore+=Math.min(20,Math.max(-20,ret5*3));
  // 成交量趋势: 近5日均量 vs 近20日均量
  if(n>=20){
    const vol5=data.slice(-5).reduce((s,d)=>s+d.vol,0)/5;
    const volAll=data.slice(-20).reduce((s,d)=>s+d.vol,0)/20;
    if(vol5>volAll*1.5)sentScore+=10; // 放量=情绪高涨
    else if(vol5<volAll*0.5)sentScore-=8; // 缩量=情绪低迷
  }
  // RSI情绪补充
  if(lastRSI>65)sentScore+=5;else if(lastRSI<35)sentScore-=5;
  sentScore=Math.min(100,Math.max(0,sentScore));

  // ===== 综合评分 (5维度等权20%各) =====
  const overall=Math.round(techScore*0.10+fibScore*0.15+macroScore*0.30+fundScore*0.15+sentScore*0.30);
  const verdict=overall>=70?{t:'强烈看多',c:'#4caf72'}:overall>=60?{t:'偏多',c:'#5b9bd5'}:overall>=50?{t:'中性偏多',c:'#8bc34a'}:overall>=40?{t:'中性',c:'#e0a23c'}:overall>=30?{t:'偏空',c:'#e05c5c'}:{t:'强烈看空',c:'#d32f2f'};
  return{techScore,fibScore,macroScore,fundScore,sentScore,overall,verdict,fib,lastRSI,lastMACD,ret5:+ret5.toFixed(2),ret20:+ret20.toFixed(2),volatility:+volatility.toFixed(2),lastVWAP,lastBoll};
}

      if(pe<15){score+=15;reasons.push('PE仅'+pe+'x，属于"稳定增长股"合理估值区间');}
      else if(pe<25){score+=8;reasons.push('PE '+pe+'x适中，需观察增长是否匹配');}
      else if(pe>50){score-=12;reasons.push('PE '+pe+'x过高，若非快速增长股则有估值陷阱风险');}
      else if(pe>35){score-=5;reasons.push('PE '+pe+'x偏贵，密切关注增长率能否支撑');}
    }
    if(roe&&roe>20){score+=10;reasons.push('ROE '+roe+'%优秀，具备"好公司"特征');}
    else if(roe&&roe>12){score+=5;reasons.push('ROE '+roe+'%良好');}
    // 趋势代表增长
    if(ret60>20){score+=8;reasons.push('60日涨幅+'+ret60.toFixed(0)+'%，可能进入快速增长期');}
    else if(ret60<-20){score-=5;reasons.push('60日跌幅显著，需判断是周期还是基本面恶化');}
    // 放量突破
    if(volRatio>1.3&&ret5>0&&ma5v>ma20v){score+=5;reasons.push('放量突破，机构关注度提升');}
    score=Math.min(100,Math.max(0,score));
    results.push({id:'lynch',score,reasons});
  })();

  // 6. 格罗斯 - 利率周期/收益率曲线/债券思维
  (function(){
    let score=50; const reasons=[];
    // 利率环境对股票的影响
    if(fedRate>=5){score-=15;reasons.push('利率高企('+fedRate+'%)，类债券资产估值承压');}
    else if(fedRate<=3){score+=12;reasons.push('低利率环境('+fedRate+'%)，利好估值扩张');}
    else{score+=3;reasons.push('利率中性('+fedRate+'%)，估值压力有限');}
    // 趋势=利率周期代理
    if(trendUp){score+=10;reasons.push('中长期上行趋势暗示流动性宽松环境');}
    if(dxyChg<-0.3){score+=5;reasons.push('美元走弱有利于全球资产定价');}
    else if(dxyChg>0.5){score-=5;reasons.push('美元走强对非美资产构成压力');}
    if(volatility<2){score+=5;reasons.push('极低波动率=稳定收益环境，债券型思维看多');}
    score=Math.min(100,Math.max(0,score));
    results.push({id:'gross',score,reasons});
  })();

  // 7. 琼斯 - 全球宏观/200日均线/不对称风险
  (function(){
    let score=50; const reasons=[];
    // 200日均线(用120日代替,因数据限制)
    const ma120=n>=120?kdata.slice(-120).reduce((s,d)=>s+d.close,0)/120:ma60avg;
    if(last>ma120){score+=15;reasons.push('价格在200日均线之上(+'+((last/ma120-1)*100).toFixed(1)+'%)，趋势看多');}
    else{score-=12;reasons.push('价格跌破200日均线('+((last/ma120-1)*100).toFixed(1)+'%)，趋势转空');}
    // 不对称风险回报
    if(lastRSI<35&&bollPos<0.2){score+=12;reasons.push('RSI低位+布林下轨=极佳风险回报比(上行空间>>下行)');}
    else if(lastRSI>70&&bollPos>0.85){score-=10;reasons.push('RSI高位+布林上轨=风险回报比恶化');}
    // 极端情绪反转
    if(vix>30){score+=5;reasons.push('VIX高位('+vix+')=市场恐慌,历史上是反向指标');}
    if(ret5<-5){score+=5;reasons.push('短期急跌('+ret5.toFixed(1)+'%)后反弹概率大,可寻找入场点');}
    score=Math.min(100,Math.max(0,score));
    results.push({id:'jones',score,reasons});
  })();

  // 8. 拉施克 - 短线波段/动量+均值回归/ADX趋势强度
  (function(){
    let score=50; const reasons=[];
    // 模拟ADX: 用方向运动指标近似
    const trendStrength=Math.abs(ret5)/volatility*20; // 趋势强度比
    if(trendStrength>1.5){
      // 强趋势中回调=入场
      if(ret5>0&&last<ma5v){score+=15;reasons.push('强势趋势中价格回调至MA5(圣杯策略触发)');}
      else if(ret5>0){score+=8;reasons.push('趋势动量强(强度指标'+trendStrength.toFixed(1)+')，顺势持有');}
    }
    // 布林反弹(均值回归)
    if(bollPos<0.15){score+=12;reasons.push('价格触及布林下轨反弹区,短线做多信号');}
    else if(bollPos>0.85){score-=8;reasons.push('布林上轨附近,短线获利了结区');}
    // MACD背离
    if(lastMACD>prevMACD&&ret5<0){score+=8;reasons.push('MACD底背离,动能恢复中,短线反弹信号');}
    // 量价分析
    if(volRatio>1.5&&ret5>1){score+=5;reasons.push('放量拉升,短线多头占优');}
    else if(volRatio>1.5&&ret5<-1){score-=5;reasons.push('放量下跌,短线空头主导');}
    score=Math.min(100,Math.max(0,score));
    results.push({id:'raschke',score,reasons});
  })();

  // 9. 李录 - 深度价值/安全边际/能力圈
  (function(){
    let score=50; const reasons=[];
    if(pe&&pe>0&&pe<12){score+=20;reasons.push('PE仅'+pe+'x，显著低估=巨大安全边际');}
    else if(pe&&pe>0&&pe<20){score+=10;reasons.push('PE '+pe+'x合理偏低，价值投资者关注区间');}
    else if(pe&&pe>40){score-=10;reasons.push('PE '+pe+'x偏高，安全边际不足');}
    if(roe&&roe>20){score+=15;reasons.push('ROE '+roe+'%优秀,可能具备"宽阔护城河"特征');}
    else if(roe&&roe>12){score+=5;reasons.push('ROE '+roe+'%良好，盈利能力可接受');}
    // 价格远低于长期均线=深度价值
    if(last<ma60avg*0.85){score+=12;reasons.push('价格大幅低于60日均线(折价'+((1-last/ma60avg)*100).toFixed(0)+'%)，可能存在价值洼地');}
    // 长期持有逻辑
    if(trendUp&&pe&&pe<25&&roe&&roe>15){score+=8;reasons.push('估值合理+ROE优秀+趋势向上=优质成长投资标的');}
    score=Math.min(100,Math.max(0,score));
    results.push({id:'li',score,reasons});
  })();

  // 10. 阿克曼 - 激进/集中持仓/估值洼地+催化剂
  (function(){
    let score=50; const reasons=[];
    // 估值洼地
    if(pe&&pe>0&&pe<15){score+=15;reasons.push('低估值(PE '+pe+'x)，若有催化剂可集中重仓');}
    else if(pe&&pe>40){score-=10;reasons.push('高估值,激进投资者通常回避');}
    // 催化剂信号: 放量突破(可能有事件驱动)
    if(volRatio>2&&ret5>3){score+=15;reasons.push('异常放量+大幅上涨=可能出现催化事件(财报/重组/管理层变动)');}
    else if(volRatio>1.5&&Math.abs(ret5)>2){score+=5;reasons.push('放量活跃,关注是否有催化剂出现');}
    // 趋势反转(困境反转)
    if(ret60<-30&&ret5>3){score+=12;reasons.push('深跌后强力反弹(困境反转信号),阿克曼式机会');}
    // 基本面支撑
    if(roe&&roe>15&&pe&&pe<20){score+=8;reasons.push('强ROE+合理PE=具备"好公司被低估"特征');}
    score=Math.min(100,Math.max(0,score));
    results.push({id:'ackman',score,reasons});
  })();

  // ===== 综合信号 =====
  const avgScore=Math.round(results.reduce((s,r)=>s+r.score,0)/results.length);
  const buyCount=results.filter(r=>r.score>=60).length;
  const sellCount=results.filter(r=>r.score<=35).length;
  let signal,signalLabel,signalDesc,signalColor;
  if(avgScore>=68&&buyCount>=7){signal='buy';signalLabel='强烈买入';signalColor='#4caf72';signalDesc='多数大师框架看多，技术面+宏观环境共振向上';}
  else if(avgScore>=60&&buyCount>=5){signal='buy';signalLabel='建议买入';signalColor='#4caf72';signalDesc='大师共识偏多，当前位置风险回报比良好';}
  else if(avgScore>=52){signal='hold';signalLabel='持有观望';signalColor='#e0a23c';signalDesc='信号分歧,建议观望等待更明确方向';}
  else if(avgScore>=40){signal='hold';signalLabel='谨慎持有';signalColor='#e0a23c';signalDesc='多数框架中性偏弱,注意风险管理';}
  else if(sellCount>=5){signal='sell';signalLabel='建议卖出';signalColor='#e05c5c';signalDesc='多数大师框架看空,技术面恶化+宏观逆风';}
  else{signal='sell';signalLabel='减仓/离场';signalColor='#e05c5c';signalDesc='综合信号偏空,建议降低仓位';}

  // 资产周期传导分析
  const cycleAnalysis=[];
  if(fedRate>=4.5)cycleAnalysis.push({lbl:'货币政策',val:'紧缩',desc:'高利率压制估值,利空成长股',c:'#e05c5c'});
  else if(fedRate>=3)cycleAnalysis.push({lbl:'货币政策',val:'中性',desc:'利率温和,对股价影响有限',c:'#e0a23c'});
  else cycleAnalysis.push({lbl:'货币政策',val:'宽松',desc:'低利率利好股市估值扩张',c:'#4caf72'});
  if(dxyChg<-0.3)cycleAnalysis.push({lbl:'美元周期',val:'走弱',desc:'美元贬值利好大宗商品和新兴市场',c:'#4caf72'});
  else if(dxyChg>0.3)cycleAnalysis.push({lbl:'美元周期',val:'走强',desc:'美元升值压制非美资产',c:'#e05c5c'});
  else cycleAnalysis.push({lbl:'美元周期',val:'平稳',desc:'汇率波动对资产影响有限',c:'#e0a23c'});
  if(vix>25)cycleAnalysis.push({lbl:'风险情绪',val:'恐慌',desc:'VIX高位=避险情绪主导,利好黄金债券',c:'#e05c5c'});
  else if(vix<15)cycleAnalysis.push({lbl:'风险情绪',val:'贪婪',desc:'VIX低位=乐观情绪,利好风险资产',c:'#4caf72'});
  else cycleAnalysis.push({lbl:'风险情绪',val:'中性',desc:'情绪指标无明显极端',c:'#e0a23c'});
  if(sp500Chg>0.5)cycleAnalysis.push({lbl:'市场趋势',val:'Risk On',desc:'标普上涨=风险偏好,资金流入股市',c:'#4caf72'});
  else if(sp500Chg<-0.5)cycleAnalysis.push({lbl:'市场趋势',val:'Risk Off',desc:'标普下跌=避险模式,资金流出',c:'#e05c5c'});
  else cycleAnalysis.push({lbl:'市场趋势',val:'震荡',desc:'指数窄幅波动,观望为主',c:'#e0a23c'});
  if(volatility>3.5)cycleAnalysis.push({lbl:'波动率周期',val:'高波动',desc:'市场不确定性大,适合对冲策略',c:'#e05c5c'});
  else if(volatility<1.5)cycleAnalysis.push({lbl:'波动率周期',val:'低波动',desc:'趋势稳定,适合趋势跟踪',c:'#4caf72'});
  else cycleAnalysis.push({lbl:'波动率周期',val:'正常',desc:'波动在合理区间',c:'#e0a23c'});
  if(trendUp)cycleAnalysis.push({lbl:'个股周期',val:'上升趋势',desc:'均线多头排列,顺势做多',c:'#4caf72'});
  else if(trendDown)cycleAnalysis.push({lbl:'个股周期',val:'下降趋势',desc:'均线空头排列,回避或做空',c:'#e05c5c'});
  else cycleAnalysis.push({lbl:'个股周期',val:'盘整',desc:'趋势不明朗,等待方向选择',c:'#e0a23c'});

  return{results,avgScore,signal,signalLabel,signalDesc,signalColor,buyCount,sellCount,cycleAnalysis};
}

/* ========== HELPER FUNCTIONS ========== */
function sentiment(md){
  let s=0;
  if(md.sp500Change>.5)s+=2;else if(md.sp500Change<-.5)s-=2;
  if(md.goldChange>1)s-=1;else if(md.goldChange<-1)s+=1;
  if(md.btcChange>2)s+=1;else if(md.btcChange<-2)s-=1;
  if(md.oilChange>2)s-=1;else if(md.oilChange<-2)s+=1;
  if(s>=3)return{l:'Risk On',d:'风险偏好',c:'#4caf72',e:'☀️'};
  if(s>=1)return{l:'偏多',d:'温和乐观',c:'#5b9bd5',e:'⛅'};
  if(s<=-3)return{l:'Risk Off',d:'风险规避',c:'#e05c5c',e:'⛈️'};
  if(s<=-1)return{l:'偏空',d:'谨慎观望',c:'#e0a23c',e:'☁️'};
  return{l:'中性',d:'多空平衡',c:'#b9b4ab',e:'☁'};
}

function genSummary(md){
  const it=[];
  if(md.sp500Change!=null){
    if(md.sp500Change>.5)it.push({c:'#4caf72',t:`标普500上涨${md.sp500Change.toFixed(2)}%，市场情绪偏乐观`});
    else if(md.sp500Change<-.5)it.push({c:'#e05c5c',t:`标普500下跌${Math.abs(md.sp500Change).toFixed(2)}%，市场承压`});
    else it.push({c:'#76726c',t:`标普500窄幅震荡(${md.sp500Change>=0?'+':''}${md.sp500Change.toFixed(2)}%)，多空博弈`});
  }
  if(md.goldChange!=null){
    if(md.goldChange>.5)it.push({c:'#e0a23c',t:`黄金走强 $${md.goldPrice}，避险需求升温`});
    else if(md.goldChange<-.5)it.push({c:'#4caf72',t:`黄金回落 $${md.goldPrice}，风险偏好回升`});
  }
  if(md.btcChange!=null){
    if(md.btcChange>2)it.push({c:'#e0a23c',t:`BTC大涨${md.btcChange.toFixed(2)}%，加密市场活跃`});
    else if(md.btcChange<-2)it.push({c:'#76726c',t:`BTC下跌${Math.abs(md.btcChange).toFixed(2)}%，加密市场降温`});
  }
  if(md.dxyChange!=null){
    if(md.dxyChange<-.3)it.push({c:'#5b9bd5',t:`美元走弱(DXY ${md.dxyIndex})，新兴市场受益`});
    else if(md.dxyChange>.3)it.push({c:'#e0a23c',t:`美元走强(DXY ${md.dxyIndex})，非美资产承压`});
  }
  it.push({c:'#d4af37',t:`美联储维持 ${md.fedRate}，关注下次议息会议点阵图`});
  if(!it.length||it.length===1)it.unshift({c:'#76726c',t:'部分实时行情加载中，稍后将自动更新'});
  return it.slice(0,5);
}

async function showStockDetail(secid,code,name){
  const el=document.getElementById('v-stocks');
  el.innerHTML=`<div class="sd-back" onclick="reloadStocks()">← 返回列表</div><div class="sd-hdr"><div class="nm">${name} (${code})</div></div><div class="loading-box"><span class="spin"></span> 加载K线与基本面…</div>`;
  let kline=[],fundData=null,rtQuote=null;
  try{
    const [kRes,fRes,qRes]=await Promise.allSettled([fetchKline(secid,120),fetchFundamentals(secid),emQuote(secid)]);
    kline=kRes.status==='fulfilled'?kRes.value:[];
    fundData=fRes.status==='fulfilled'?fRes.value:null;
    if(qRes.status==='fulfilled'&&qRes.value){const q=qRes.value[secid];if(q&&q.price!=null)rtQuote={price:Number(q.price),chg:Number(q.chg)||0};}
  }catch(e){
    el.innerHTML=`<div class="sd-back" onclick="reloadStocks()">← 返回列表</div><div class="sd-hdr"><div class="nm">${name} (${code})</div></div><div class="loading-box" style="color:var(--orange)">数据加载失败<br><span style="font-size:10px;color:var(--text-3)">${e.message||'网络超时'}</span><br><span style="margin-top:10px;display:inline-block;color:var(--gold);cursor:pointer" onclick="showStockDetail('${secid}','${code}','${name}')">点击重试</span></div>`;
    return;
  }
  const stockInfo={name,id:code,price:null,changePct:null,secid};
  if(rtQuote){stockInfo.price=rtQuote.price;stockInfo.changePct=rtQuote.chg;}
  else if(kline.length>0){stockInfo.price=kline[kline.length-1].close;}
  // 实时行情头部
  let rtPriceHTML='';
  if(rtQuote){
    const pCls=rtQuote.chg>0?'up':rtQuote.chg<0?'down':'flat';
    const pStr=rtQuote.chg>=0?'+':'';
    const prevClose=rtQuote.chg!=null?+(rtQuote.price/(1+rtQuote.chg/100)).toFixed(2):null;
    rtPriceHTML=`<div class="sd-rt-price ${pCls}"><span class="price">${rtQuote.price.toFixed(2)}</span><span class="chg">${pStr}${rtQuote.chg.toFixed(2)}%</span>${prevClose?'<span class="prev">昨收 '+prevClose+'</span>':''}</div>`;
  }

  // K-line SVG (simplified mobile version with MA + candles)
  let chartHTML='<div style="color:var(--text-3);text-align:center;padding:16px;font-size:11px">暂无K线数据</div>';
  if(kline.length>10){
    const W=Math.min(window.innerWidth-48,600),H=180,padL=40,padR=8,padT=10,padB=20;
    const gw=(W-padL-padR)/kline.length;
    const prices=kline.flatMap(k=>[k.high,k.low]);
    const pMax=Math.max(...prices),pMin=Math.min(...prices),pRange=pMax-pMin||1;
    const py=v=>padT+(pMax-v)/pRange*(H-padT-padB);
    let candles='';
    kline.forEach((d,i)=>{
      const x=padL+i*gw+gw*0.1,w=gw*0.8;
      const bull=d.close>=d.open;const col=bull?'#4caf72':'#e05c5c';
      const bodyTop=py(Math.max(d.open,d.close)),bodyBot=py(Math.min(d.open,d.close));
      candles+=`<line x1="${x+w/2}" y1="${py(d.high)}" x2="${x+w/2}" y2="${py(d.low)}" stroke="${col}" stroke-width="1"/>`;
      candles+=`<rect x="${x}" y="${bodyTop}" width="${w}" height="${Math.max(1,bodyBot-bodyTop)}" fill="${col}" rx="1"/>`;
    });
    // MA lines
    const ma5=calcMA(kline,5),ma20=calcMA(kline,20);
    const maLine=(arr,color)=>{const pts=arr.map((v,i)=>v!=null?`${padL+i*gw+gw/2},${py(v)}`:null).filter(Boolean);return pts.length>1?`<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.2" opacity=".7"/>`:'';};
    chartHTML=`<svg viewBox="0 0 ${W} ${H}" class="kline-svg">${candles}${maLine(ma5,'#d4af37')}${maLine(ma20,'#5b9bd5')}</svg><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-3);margin-top:3px"><span>${kline[0].date}</span><span>MA5·MA20·120日</span><span>${kline[kline.length-1].date}</span></div>`;
  }

  // Fundamentals
  let fundHTML='';
  if(fundData){
    const items=[{l:'PE',v:fundData.pe},{l:'PB',v:fundData.pb},{l:'ROE',v:fundData.roe?fundData.roe+'%':null},{l:'市值',v:fundData.mktCap?(fundData.mktCap>1e12?(fundData.mktCap/1e12).toFixed(1)+'万亿':(fundData.mktCap/1e8).toFixed(0)+'亿'):null}];
    fundHTML=`<div class="sec-t">📊 基本面</div><div class="sd-fund">${items.map(i=>`<div class="item"><div class="v">${i.v||'—'}</div><div class="l">${i.l}</div></div>`).join('')}</div>`;
  }

  // AI Score
  let scoreHTML='';
  const score=kline.length>=20?aiScore(kline,fundData):null;
  if(score){
    const bar=(lbl,pct,col)=>`<div class="ai-dim"><span class="ai-lbl">${lbl}</span><div class="ai-bar"><div class="ai-fill" style="width:${pct}%;background:${col}"></div></div><span class="ai-pct">${pct}</span></div>`;
    scoreHTML=`<div class="sec-t">🤖 AI评分</div><div class="card ai-box gold-edge"><div class="ai-overall"><span class="ai-score" style="color:${score.verdict.c}">${score.overall}</span><span class="ai-verdict" style="color:${score.verdict.c}">${score.verdict.t}</span></div>${bar('宏观30%',score.macroScore,'#ab47bc')}${bar('情绪30%',score.sentScore,'#e0a23c')}${bar('斐波那契15%',score.fibScore,'#5b9bd5')}${bar('基本面15%',score.fundScore,'#4caf72')}${bar('技术10%',score.techScore,'#d4af37')}<div class="ai-meta">RSI ${score.lastRSI} · MACD ${score.lastMACD>0?'金叉':'死叉'} · 波动 ${score.volatility}% · 5日 ${score.ret5>=0?'+':''}${score.ret5}%</div></div>`;
  }

  // Fibonacci
  let fibHTML='';
  if(score&&score.fib){
    const f=score.fib;
    fibHTML=`<div class="sec-t">📐 斐波那契</div><div class="card gold-edge" style="padding:10px 12px">${f.retraceLevels.map(l=>{const dist=((l.price-f.last)/f.last*100).toFixed(1);const col=l.price<f.last?'#4caf72':'#e05c5c';return `<div class="fib-row"><span class="fib-pct">${l.pct}</span><span class="fib-price" style="color:${col}">${l.price.toFixed(2)}</span><span class="fib-dist" style="color:${col}">${dist>0?'+':''}${dist}%</span></div>`;}).join('')}<div class="fib-tags"><span class="fib-tag support">支撑 ${f.nearestSupport.pct} = ${f.nearestSupport.price.toFixed(2)}</span><span class="fib-tag resist">阻力 ${f.nearestResist.pct} = ${f.nearestResist.price.toFixed(2)}</span></div></div>`;
  }

  // Master Framework Analysis
  let mfHTML='';
  const mfResult=masterFrameworkAnalysis(kline,fundData,stockInfo);
  if(mfResult){
    const sigIcon=mfResult.signal==='buy'?'🟢':mfResult.signal==='sell'?'🔴':'🟡';
    const masterCards=mfResult.results.map(r=>{
      const m=MASTERS.find(x=>x.id===r.id);if(!m)return '';
      const sig=r.score>=60?'buy':r.score<=35?'sell':'hold';
      const sigText=sig==='buy'?'看多':sig==='sell'?'看空':'中性';
      return `<div class="mf-card"><div class="mf-card-head"><div class="mf-card-av" style="background:${m.c}22;color:${m.c}">${m.av}</div><div><div class="mf-card-nm">${m.nm}</div><div class="mf-card-style">${m.style}</div></div></div><div class="mf-card-signal"><span class="tag ${sig}">${sigText}</span><span class="score" style="color:${sig==='buy'?'#4caf72':sig==='sell'?'#e05c5c':'#e0a23c'}">${r.score}</span></div><div class="mf-card-reasons">${r.reasons.slice(0,2).map(x=>'<div class="r">'+x+'</div>').join('')}</div></div>`;
    }).join('');
    const cycleItems=mfResult.cycleAnalysis.map(c=>`<div class="mf-cycle-item"><div class="lbl">${c.lbl}</div><div class="val" style="color:${c.c}">${c.val}</div></div>`).join('');
    mfHTML=`<div class="sec-t">♔ 大师框架分析<span class="cnt">${mfResult.buyCount}看多/${mfResult.sellCount}看空</span></div>
    <div class="mf-signal ${mfResult.signal}"><div class="mf-signal-icon">${sigIcon}</div><div class="mf-signal-text"><div class="mf-signal-label" style="color:${mfResult.signalColor}">${mfResult.signalLabel}</div><div class="mf-signal-desc">${mfResult.signalDesc}</div></div><div class="mf-signal-score" style="color:${mfResult.signalColor}">${mfResult.avgScore}</div></div>
    <div class="mf-grid">${masterCards}</div>
    <div class="mf-cycle"><div class="mf-cycle-title">🔄 资产周期传导</div><div class="mf-cycle-grid">${cycleItems}</div></div>
    <div style="font-size:9px;color:var(--text-3);padding:8px 0;line-height:1.4">⚠️ 以上分析基于大师交易逻辑的量化映射,仅供参考。</div>`;
  }

  el.innerHTML=`<div class="sd-back" onclick="reloadStocks()">← 返回列表</div>
    <div class="sd-hdr"><div class="nm">${name} (${code})</div></div>
    ${rtPriceHTML}
    <div class="sec-t">📈 K线(120日)</div><div class="sd-chart">${chartHTML}</div>
    ${fundHTML}${scoreHTML}${fibHTML}${mfHTML}`;
}

      if(!hasData&&attempt===0){await new Promise(r=>setTimeout(r,1500));continue;}

      }
    }
  }
}

function hfTechnicalAgent(kdata){
  if(!kdata||kdata.length<20) return {signal:'neutral',confidence:50,reasoning:'K线数据不足'};
  const n=kdata.length, last=kdata[n-1].close;
  const r=[];for(let i=1;i<n;i++){const p=kdata[i].close-kdata[i-1].close;r.push({d:p,u:p>0?p:0,l:p<0?-p:0});}
  const ema8=calcMA(kdata,8),ema21=calcMA(kdata,21),ema55=calcMA(kdata,55);
  const e8=ema8[n-1],e21=ema21[n-1],e55=ema55[n-1];
  const upMove=r.slice(-14).reduce((s,x)=>s+x.u,0)/14;
  const dnMove=r.slice(-14).reduce((s,x)=>s+x.l,0)/14;
  const adx=upMove+dnMove>0?Math.abs(upMove-dnMove)/(upMove+dnMove)*100:50;
  let tSig='neutral',tConf=0.5;
  if(e8&&e21&&e55){if(e8>e21&&e21>e55){tSig='bullish';tConf=adx/100;}else if(e8<e21&&e21<e55){tSig='bearish';tConf=adx/100;}}
  const ma50=calcMA(kdata,Math.min(50,n));const last50=ma50[n-1]||last;
  const vals50=kdata.slice(-Math.min(50,n)).map(d=>d.close);
  const m50=vals50.reduce((a,b)=>a+b,0)/vals50.length;
  const s50=Math.sqrt(vals50.reduce((s,v)=>s+(v-m50)**2,0)/vals50.length)||1;
  const zScore=(last-m50)/s50;
  const boll=calcBoll(kdata,20,2);const bLast=boll[n-1];
  const bollPos=bLast&&bLast.upper!==bLast.lower?(last-bLast.lower)/(bLast.upper-bLast.lower):0.5;
  let mSig='neutral',mConf=0.5;
  if(zScore<-2&&bollPos<0.2){mSig='bullish';mConf=Math.min(Math.abs(zScore)/4,1);}
  else if(zScore>2&&bollPos>0.8){mSig='bearish';mConf=Math.min(Math.abs(zScore)/4,1);}
  const ret1m=n>=21?(last-kdata[n-21].close)/kdata[n-21].close:0;
  const ret3m=n>=63?(last-kdata[n-63].close)/kdata[n-63].close:ret1m;
  const momScore=0.5*ret1m+0.5*ret3m;
  const vol5a=kdata.slice(-5).reduce((s,d)=>s+d.vol,0)/5;
  const vol20a=kdata.slice(-20).reduce((s,d)=>s+d.vol,0)/20;
  const volConf=vol20a>0?vol5a/vol20a:1;
  let pSig='neutral',pConf=0.5;
  if(momScore>0.05&&volConf>1){pSig='bullish';pConf=Math.min(Math.abs(momScore)*5,1);}
  else if(momScore<-0.05&&volConf>1){pSig='bearish';pConf=Math.min(Math.abs(momScore)*5,1);}
  const rets=kdata.slice(-21).map((d,i,a)=>i===0?0:(d.close-a[i-1].close)/a[i-1].close).slice(1);
  const avgR=rets.reduce((a,b)=>a+b,0)/rets.length;
  const histVol=Math.sqrt(rets.reduce((s,r)=>s+(r-avgR)**2,0)/rets.length)*Math.sqrt(252);
  let vSig='neutral',vConf=0.5;
  if(histVol<0.15){vSig='bullish';vConf=0.7;}else if(histVol>0.4){vSig='bearish';vConf=0.6;}
  const prices=kdata.slice(-20).map(d=>d.close);let tauSum=0,lagSum=0,cnt=0;
  for(let lag=2;lag<Math.min(10,prices.length);lag++){
    const diffs=[];for(let i=lag;i<prices.length;i++)diffs.push(prices[i]-prices[i-lag]);
    const sd=Math.sqrt(diffs.reduce((s,v)=>s+v*v,0)/diffs.length);
    if(sd>0){tauSum+=Math.log(sd);lagSum+=Math.log(lag);cnt++;}
  }
  const hurst=cnt>=2?(tauSum/cnt)/(lagSum/cnt):0.5;
  let sSig='neutral',sConf=0.5;
  if(hurst<0.4){sSig='bullish';sConf=(0.5-hurst)*2;}
  const W={trend:0.25,mean:0.20,mom:0.25,vol:0.15,stat:0.15};
  const SV={bullish:1,neutral:0,bearish:-1};
  const signals=[{s:tSig,c:tConf,w:W.trend},{s:mSig,c:mConf,w:W.mean},{s:pSig,c:pConf,w:W.mom},{s:vSig,c:vConf,w:W.vol},{s:sSig,c:sConf,w:W.stat}];
  let ws=0,tc=0;signals.forEach(x=>{ws+=SV[x.s]*x.w*x.c;tc+=x.w*x.c;});
  const fs=tc>0?ws/tc:0;
  const signal=fs>0.2?'bullish':fs<-0.2?'bearish':'neutral';
  const details=[];
  if(tSig!=='neutral')details.push('趋势:'+tSig);if(mSig!=='neutral')details.push('均值回归:'+mSig);
  if(pSig!=='neutral')details.push('动量:'+pSig);if(vSig!=='neutral')details.push('波动率:'+vSig);
  if(sSig!=='neutral')details.push('统计:'+sSig);
  return{signal,confidence:Math.round(Math.abs(fs)*100),reasoning:details.join(' | ')||'技术指标信号中性'};
}

function hfFundamentalsAgent(fund){
  if(!fund) return {signal:'neutral',confidence:50,reasoning:'基本面数据不可用'};
  const signals=[],reasons=[];
  if(fund.roe>15)signals.push('bullish');else if(fund.roe<5)signals.push('bearish');else signals.push('neutral');
  reasons.push(fund.roe?'ROE '+(fund.roe).toFixed(1)+'%':'ROE N/A');
  if(fund.pe&&fund.pe>0&&fund.pe<20)signals.push('bullish');else if(fund.pe&&fund.pe>35)signals.push('bearish');else signals.push('neutral');
  reasons.push(fund.pe?'PE '+fund.pe.toFixed(1)+'x':'PE N/A');
  if(fund.pb&&fund.pb>0&&fund.pb<2)signals.push('bullish');else if(fund.pb&&fund.pb>5)signals.push('bearish');else signals.push('neutral');
  reasons.push(fund.pb?'PB '+fund.pb.toFixed(1)+'x':'PB N/A');
  if(fund.eps&&fund.eps>0)signals.push('bullish');else if(fund.eps&&fund.eps<0)signals.push('bearish');else signals.push('neutral');
  reasons.push(fund.eps?'EPS '+fund.eps.toFixed(2):'EPS N/A');
  const bull=signals.filter(s=>s==='bullish').length,bear=signals.filter(s=>s==='bearish').length;
  return{signal:bull>bear?'bullish':bear>bull?'bearish':'neutral',confidence:Math.round(Math.max(bull,bear)/signals.length*100),reasoning:reasons.join(', ')};
}

function hfValuationAgent(fund,kdata){
  if(!fund) return {signal:'neutral',confidence:50,reasoning:'估值数据不足'};
  let score=50;const reasons=[];
  if(fund.pe&&fund.pe>0){
    if(fund.pe<12){score+=20;reasons.push('PE '+fund.pe+'x 深度低估');}
    else if(fund.pe<20){score+=10;reasons.push('PE '+fund.pe+'x 合理偏低');}
    else if(fund.pe>40){score-=15;reasons.push('PE '+fund.pe+'x 高估值风险');}
    else if(fund.pe>25){score-=5;reasons.push('PE '+fund.pe+'x 略高于均值');}
  }
  if(fund.pb&&fund.pb>0){
    if(fund.pb<1){score+=15;reasons.push('PB '+fund.pb+'x 破净');}
    else if(fund.pb<2){score+=8;reasons.push('PB '+fund.pb+'x 偏低');}
    else if(fund.pb>6){score-=10;reasons.push('PB '+fund.pb+'x 偏高');}
  }
  if(fund.eps&&fund.pe&&fund.pe>0){

    if(earnYield>5){score+=10;reasons.push('盈利收益率'+earnYield.toFixed(1)+'%');}
    else if(earnYield<2){score-=5;reasons.push('盈利收益率仅'+earnYield.toFixed(1)+'%');}
  }
  score=Math.min(100,Math.max(0,score));
  return{signal:score>=60?'bullish':score<=40?'bearish':'neutral',confidence:Math.abs(score-50)*2,reasoning:reasons.join(' | ')||'估值中性'};
}

function hfGrowthAgent(fund,kdata){
  if(!fund||!kdata||kdata.length<40) return {signal:'neutral',confidence:50,reasoning:'成长数据不足'};
  let score=50;const reasons=[];const n=kdata.length;

}

function hfRiskManager(kdata,fund,info){
  if(!kdata||kdata.length<20) return {remainingLimit:0,volatility:0.25,volAdj:'N/A',corrMultiplier:1};
  const n=kdata.length,last=kdata[n-1].close;
  const rets=[];for(let i=1;i<n;i++)rets.push((kdata[i].close-kdata[i-1].close)/kdata[i-1].close);
  const avgR=rets.reduce((a,b)=>a+b,0)/rets.length;
  const std=Math.sqrt(rets.reduce((s,r)=>s+(r-avgR)**2,0)/rets.length);
  const annVol=std*Math.sqrt(252);
  let volMult;
  if(annVol<0.15) volMult=1.25;
  else if(annVol<0.30) volMult=1.0-(annVol-0.15)*0.5;
  else if(annVol<0.50) volMult=0.75-(annVol-0.30)*0.5;
  else volMult=0.50;
  volMult=Math.max(0.25,Math.min(1.25,volMult));
  const limitPct=0.20*volMult;
  let corrMult=1.0;
  const md=cache||{};const spChg=md.sp500Change||0;
  const stkChg=n>=6?(last-kdata[n-6].close)/kdata[n-6].close*100:0;
  if(Math.abs(spChg)>0&&Math.abs(stkChg)>0){
    const dir=Math.sign(spChg)*Math.sign(stkChg);
    if(dir>0&&Math.abs(stkChg)>Math.abs(spChg)*2) corrMult=0.85;
    else if(dir>0) corrMult=1.0;else corrMult=1.05;
  }
  const finalLimit=limitPct*corrMult;
  let volAdj;
  if(annVol<0.15) volAdj='低波动·高仓位';
  else if(annVol<0.30) volAdj='中波动·标准';
  else if(annVol<0.50) volAdj='高波动·缩减';
  else volAdj='极高波动·最小';
  return{remainingLimit:+(finalLimit*100).toFixed(1),volatility:+(annVol*100).toFixed(1),volAdj,corrMultiplier:corrMult};
}

// ---- 危机预警系统 (基于2000/2008/1993/2022历史危机特征) ----
// 宏观信号: 利率、信用、波动率(VIXY代理)、国债收益率(实时) | 微观信号: 估值、技术面、企业质量
function crisisCheckStock(kdata, fund, info){
  const warns=[];const md=cache||{};
  // ===== 宏观信号 (数据源: 东方财富push2实时API) =====
  // 1) 联储利率 — 高利率压制估值 (参考2000年6.3%, 1993年急加至6%)
  const fedRateStr=md.fedRate||'4.25-4.50%';
  const fedRateHi=parseFloat((fedRateStr.match(/[\d.]+/g)||[]).pop())||4.5;
  if(fedRateHi>=5.5) warns.push({level:'danger',msg:'联储利率'+fedRateHi+'%偏高，压制估值 (参考1993/2000加息周期)'});
  else if(fedRateHi>=5.0) warns.push({level:'warn',msg:'联储利率'+fedRateHi+'%处于限制性水平'});
  // 2) VIX恐慌指数 — 实时来源: VIXY(VIX短期期货ETF)×1.2估算 | 2008:55, 2020:65, 2000:35
  const vix=parseFloat(md.vixIndex)||null;
  const vixChg=parseFloat(md.vixChange)||null;
  if(vix!=null){
    const src=md.vixSource||'VIX';
    if(vix>30) warns.push({level:'danger',msg:'VIX['+src+'] '+vix.toFixed(1)+' 市场恐慌 (历史危机:35-65)'+(vixChg>0?' 当日+'+vixChg.toFixed(1)+'%↑':'')});
    else if(vix>20) warns.push({level:'warn',msg:'VIX['+src+'] '+vix.toFixed(1)+' 偏高'+(vixChg>5?' 单日飙升+'+vixChg.toFixed(1)+'%! 恐慌加剧':'')});
    // VIX单日飙升检测 (即使绝对值不高, 单日涨>15%也是恐慌前兆)
    else if(vixChg>15) warns.push({level:'warn',msg:'VIX代理VIXY单日飙升+'+vixChg.toFixed(1)+'%，恐慌情绪急升 (2008/2020前兆特征)'});
  }
  // 3) 10Y-2Y利差倒挂 — 实时来源: 171.US2Y/US10Y国债收益率
  const t2y=parseFloat(md.t2y)||null;
  const t10yVal=parseFloat(md.t10y)||null;
  if(t10yVal!=null&&t2y!=null){
    const spread=t10yVal-t2y;
    const spStr=spread.toFixed(2);
    if(spread<-0.3) warns.push({level:'danger',msg:'收益率曲线倒挂('+spStr+'%) 10Y:'+t10yVal+'%/2Y:'+t2y+'%，衰退强信号 (2000/2008/2022均出现)'});
    else if(spread<0) warns.push({level:'warn',msg:'收益率曲线倒挂('+spStr+'%) 10Y:'+t10yVal+'%/2Y:'+t2y+'%，需关注'});
    else if(spread<0.3) warns.push({level:'warn',msg:'收益率曲线极度平坦('+spStr+'%) 10Y:'+t10yVal+'%/2Y:'+t2y+'%，经济衰退前兆'});
  }
  // 4) 10Y绝对水平 — 30Y>5%是历史危险区(2000年6.0%, 2007年5.0%)
  const t30y=parseFloat(md.t30y)||null;
  if(t30y!=null){
    if(t30y>5.0) warns.push({level:'danger',msg:'30Y国债'+t30y+'%突破5%，长端利率飙升 (参考2000/2007危机前水平)'});
    else if(t30y>4.5) warns.push({level:'warn',msg:'30Y国债'+t30y+'%偏高，无风险利率压制权益估值'});
  }
  // 5) 高收益债信用利差 (2008:10.5%, 2020:8.5%, 正常:2-4%)
  const hySpread=parseFloat(md.hySpread)||null;
  if(hySpread&&hySpread>7) warns.push({level:'danger',msg:'高收益债利差'+hySpread+'%，信用市场紧张 (类似2008)'});
  else if(hySpread&&hySpread>5) warns.push({level:'warn',msg:'高收益债利差'+hySpread+'%，信用风险抬升'});
  // 6) CPI通胀 (2022:8%+, 2000:3.4%)
  const cpi=parseFloat(md.cpi)||null;
  if(cpi&&cpi>5) warns.push({level:'danger',msg:'CPI '+cpi+'%严重偏高，滞胀风险 (参考2022)'});
  else if(cpi&&cpi>3.5) warns.push({level:'warn',msg:'CPI '+cpi+'%高于目标，关注联储政策'});
  // 7) 失业率 (2008:7.3%, 2020:14.7%, 正常:3.5-4.5%)
  const unrate=parseFloat(md.unemployment)||null;
  if(unrate&&unrate>6) warns.push({level:'danger',msg:'失业率'+unrate+'%，经济衰退信号 (2008:7.3%)'});
  else if(unrate&&unrate>5) warns.push({level:'warn',msg:'失业率'+unrate+'%偏高，经济放缓'});

  // ===== 微观信号 (个股层面) =====
  if(!kdata||kdata.length<20) return{level:'unknown',signals:warns};
  const n=kdata.length,last=kdata[n-1].close;
  // 7) PE极端估值 (2000年纳指PE>100的教训)
  const pe=fund?.pe||null;
  if(pe&&pe>60) warns.push({level:'danger',msg:'PE '+pe+'x极端高估，泡沫风险 (2000年教训)'});
  else if(pe&&pe>40) warns.push({level:'warn',msg:'PE '+pe+'x估值偏高，需高增长支撑'});
  // 8) 价格远离长期均线 (2000/2008崩盘前>30%偏离)
  const ma60avg=n>=60?kdata.slice(-60).reduce((s,d)=>s+d.close,0)/60:null;
  if(ma60avg){
    const deviation=(last/ma60avg-1)*100;
    if(deviation>30) warns.push({level:'danger',msg:'价格高于60日均线'+deviation.toFixed(0)+'%，过热信号'});
    else if(deviation>20) warns.push({level:'warn',msg:'价格高于60日均线'+deviation.toFixed(0)+'%，注意回调风险'});
  }
  // 9) 短期急跌 (2008/2020崩盘特征)
  const ret5=n>=6?(last-kdata[n-6].close)/kdata[n-6].close*100:0;
  const ret20=n>=21?(last-kdata[n-21].close)/kdata[n-21].close*100:0;
  if(ret5<-10) warns.push({level:'danger',msg:'5日暴跌'+ret5.toFixed(1)+'%，可能进入危机模式'});
  else if(ret20<-20) warns.push({level:'danger',msg:'20日跌幅'+ret20.toFixed(1)+'%，趋势性下跌'});
  else if(ret20<-10) warns.push({level:'warn',msg:'20日下跌'+ret20.toFixed(1)+'%，下行趋势明显'});
  // 10) 波动率异常放大 (危机前兆)
  const vol20=kdata.slice(-20);
  const avgC20=vol20.reduce((s,d)=>s+d.close,0)/vol20.length;
  const std20=Math.sqrt(vol20.reduce((s,d)=>s+(d.close-avgC20)**2,0)/vol20.length);
  const volatility=std20/avgC20*100;
  if(volatility>8) warns.push({level:'danger',msg:'日波动率'+volatility.toFixed(1)+'%异常(年化>'+Math.round(volatility*Math.sqrt(252))+'%)'});
  else if(volatility>5) warns.push({level:'warn',msg:'日波动率'+volatility.toFixed(1)+'%偏高(年化~'+Math.round(volatility*Math.sqrt(252))+'%)'});
  // 11) ROE恶化 (2000年dot-com企业无盈利)
  const roe=fund?.roe;
  if(roe!=null&&roe<0) warns.push({level:'warn',msg:'ROE为负('+roe+'%)，企业亏损'});
  else if(roe!=null&&roe<3&&roe>=0) warns.push({level:'warn',msg:'ROE仅'+roe+'%，盈利能力极弱'});
  // 12) 放量暴跌 (典型恐慌性抛售, 2008/2020常见)
  const vol5avg=kdata.slice(-5).reduce((s,d)=>s+d.vol,0)/5;
  const vol20avg=kdata.slice(-20).reduce((s,d)=>s+d.vol,0)/20;
  const volRatio=vol20avg>0?vol5avg/vol20avg:1;
  if(volRatio>2&&ret5<-5) warns.push({level:'danger',msg:'放量暴跌(量比'+volRatio.toFixed(1)+'x, 5日'+ret5.toFixed(1)+'%)，恐慌抛售'});
  else if(volRatio>1.5&&ret5<-3) warns.push({level:'warn',msg:'放量下跌(量比'+volRatio.toFixed(1)+'x)，卖压加重'});

  const dangerCount=warns.filter(w=>w.level==='danger').length;
  const warnCount=warns.filter(w=>w.level==='warn').length;
  let level='safe';
  if(dangerCount>=2) level='danger';
  else if(dangerCount>=1||warnCount>=3) level='warn';
  else if(warnCount>=2) level='watch';
  return{level,signals:warns,dangerCount,warnCount};
}

function hfPortfolioManager(allSignals,risk){
  const SV={bullish:1,neutral:0,bearish:-1};
  let tws=0,tw=0,buyC=0,sellC=0;
  const QUANT_W=0.50,MASTER_W=0.50;
  const qw=QUANT_W/5;
  ['technical','fundamentals','valuation','growth','sentiment'].forEach(k=>{
    const s=allSignals[k];if(!s)return;
    tws+=SV[s.signal]*(s.confidence/100)*qw;tw+=qw;
    if(s.signal==='bullish')buyC++;if(s.signal==='bearish')sellC++;
  });
  if(allSignals.masters){
    const mw=MASTER_W/Math.max(allSignals.masters.agents.length,1);
    allSignals.masters.agents.forEach(a=>{
      tws+=SV[a.signal]*(a.confidence/100)*mw;tw+=mw;
      if(a.signal==='bullish')buyC++;if(a.signal==='bearish')sellC++;
    });
  }
  const ns=tw>0?tws/tw:0;
  const totalAgents=5+(allSignals.masters?allSignals.masters.agents.length:0);
  const avgConf=Math.round(((allSignals.technical?.confidence||0)+(allSignals.fundamentals?.confidence||0)+(allSignals.valuation?.confidence||0)+(allSignals.growth?.confidence||0)+(allSignals.sentiment?.confidence||0)+(allSignals.masters?allSignals.masters.agents.reduce((s,a)=>s+a.confidence,0)/allSignals.masters.agents.length:0))/totalAgents);
  const overallScore=Math.round((ns+1)/2*100);
  let action,actionLabel,confidence;
  if(ns>0.35&&buyC>=Math.ceil(totalAgents*0.6)){action='strong-buy';actionLabel='强烈买入';confidence=Math.min(95,avgConf+10);}
  else if(ns>0.15&&buyC>=Math.ceil(totalAgents*0.4)){action='buy';actionLabel='买入';confidence=avgConf;}
  else if(ns<-0.35&&sellC>=Math.ceil(totalAgents*0.6)){action='strong-sell';actionLabel='强烈卖出';confidence=Math.min(95,avgConf+10);}
  else if(ns<-0.15&&sellC>=Math.ceil(totalAgents*0.4)){action='sell';actionLabel='卖出';confidence=avgConf;}
  else if(ns>0.05){action='buy';actionLabel='谨慎买入';confidence=Math.max(30,avgConf-10);}
  else if(ns<-0.05){action='sell';actionLabel='谨慎减仓';confidence=Math.max(30,avgConf-10);}
  else{action='hold';actionLabel='持有观望';confidence=avgConf;}
  const volPenalty=risk.volatility<=15?1:Math.max(0.25,1/(1+Math.log(1+(risk.volatility-15)/15)));
  confidence=Math.round(Math.max(0,Math.min(100,confidence*volPenalty)));
  const reasons=[];
  reasons.push(buyC+'看多/'+sellC+'看空(共'+totalAgents+'Agent)');
  if(risk.volatility>30)reasons.push('年化波动率'+risk.volatility+'%偏高');
  return{action,actionLabel,confidence,buyCount:buyC,sellCount:sellC,neutralCount:totalAgents-buyC-sellC,totalAgents,overallScore,reasons,weightedScore:+ns.toFixed(3),maxPositionPct:risk.remainingLimit};
}

let hfRunning=false;
async function loadHedgeFund(silent){
  if(hfRunning)return;hfRunning=true;
  const el=document.getElementById('hfContent');
  if(!el){hfRunning=false;return;}
  const total=HF_TRADEABLE.length;
  if(!silent) el.innerHTML=`<div class="hf-hero"><h2>AI对冲基金决策引擎</h2>
    <p>15位Agent并行分析 · 5量化策略 + 10投资大师 · 波动率风控</p></div>
    <div class="hf-progress"><div class="lbl" id="hfProgLbl">准备中…</div><div class="bar"><span id="hfProgBar"></span></div></div>`;
  const progBar=el.querySelector('#hfProgBar'),progLbl=el.querySelector('#hfProgLbl');
  const uProg=(i,s)=>{if(progBar)progBar.style.width=((i+1)/total*100)+'%';if(progLbl)progLbl.textContent=(i+1)+'/'+total+' '+s;};
  // 批量获取实时行情 (emQuote 20秒缓存, 盘中实时)
  let quoteMap={};
  try{quoteMap=await emQuote(HF_TRADEABLE.map(x=>x[0]).join(','));}catch(e){console.warn('对冲实时行情获取失败',e);}
  const results=[];
  for(let i=0;i<HF_TRADEABLE.length;i++){
    const [secid,code,name]=HF_TRADEABLE[i];
    uProg(i,name);
    if(i>0)await new Promise(r=>setTimeout(r,150)); // 轻量延迟,腾讯备用源CORS友好
    let kdata=[],fund=null;
    try{[kdata,fund]=await Promise.allSettled([fetchKline(secid,60),fetchFundamentals(secid)]).then(r=>[r[0].status==='fulfilled'?r[0].value:[],r[1].status==='fulfilled'?r[1].value:null]);}catch(e){}
    const q=quoteMap[secid];
    const rtPrice=(q&&q.price!=null)?Number(q.price):null;
    const rtChg=(q&&q.chg!=null)?Number(q.chg):null;
    const prevClose=(rtChg!=null&&rtPrice)?+(rtPrice/(1+rtChg/100)).toFixed(2):null;
    if(!kdata||!kdata.length){
      uProg(i,name+' (K线不可用,仅显示实时行情)');
      results.push({secid,code,name,kdata:null,currentPrice:rtPrice,prevClose,priceChange:rtChg||0,decision:{action:'hold',actionLabel:'数据不足',confidence:0,overallScore:0,reasons:['K线数据暂时不可用,无法进行完整分析'],buyCount:0,sellCount:0,neutralCount:0,totalAgents:0,weightedScore:0,maxPositionPct:0},risk:{volatility:0,remainingLimit:0,corrAdjust:1},signals:{},crisis:null});
      continue;
    }
    const kClose=kdata[kdata.length-1].close;
    const curPrice=rtPrice||kClose;
    // 涨跌幅: emQuote的chg是以上一交易日收盘为基准的实时涨跌幅
    const priceChange=(rtChg!=null)?rtChg:((kdata.length>1&&kdata[kdata.length-2].close)?((curPrice-kdata[kdata.length-2].close)/kdata[kdata.length-2].close*100):0);
    const info={id:code,name,price:curPrice,changePct:priceChange};
    const tech=hfTechnicalAgent(kdata);
    const fundA=hfFundamentalsAgent(fund);
    const val=hfValuationAgent(fund,kdata);
    const grow=hfGrowthAgent(fund,kdata);
    const sent=hfSentimentAgent(kdata);
    const masters=hfMasterAgents(kdata,fund,info);
    const risk=hfRiskManager(kdata,fund,info);
    const decision=hfPortfolioManager({technical:tech,fundamentals:fundA,valuation:val,growth:grow,sentiment:sent,masters},{...risk,currentPrice:curPrice});
    const crisis=crisisCheckStock(kdata,fund,info);
    results.push({secid,code,name,kdata,fund,currentPrice:curPrice,prevClose,priceChange,info,agents:{technical:tech,fundamentals:fundA,valuation:val,growth:grow,sentiment:sent,masters},risk,decision,crisis});
    uProg(i,name+' ✓');
  }
  el.dataset.ts=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  renderHedgeFundResults(el,results);
  hfRunning=false;
}

function hfAgentCard(name,id,agent){
  if(!agent) return '';
  const sc=agent.signal==='bullish'?'bullish':agent.signal==='bearish'?'bearish':'neutral';
  const st=agent.signal==='bullish'?'看多':agent.signal==='bearish'?'看空':'中性';
  return '<div class="hf-ac"><div class="nm">'+name+'</div><div class="sig '+sc+'">'+st+'</div><div class="ct">置信度 '+agent.confidence+'%</div>'+(agent.reasoning?'<div class="rs">'+agent.reasoning+'</div>':'')+'</div>';
}

function renderHedgeFundResults(el,results){
  const valid=results.filter(r=>r.decision);
  const ts=el.dataset.ts||new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const sb=valid.filter(r=>r.decision.action==='strong-buy').length;
  const by=valid.filter(r=>r.decision.action==='buy').length;
  const hd=valid.filter(r=>r.decision.action==='hold').length;
  const sl=valid.filter(r=>['sell','strong-sell'].includes(r.decision.action)).length;
  const avgScore=valid.length?Math.round(valid.reduce((s,r)=>s+r.decision.overallScore,0)/valid.length):0;
  const sentDir=sb+by>sl*1.5?'bullish':sl>(sb+by)*1.5?'bearish':'neutral';
  const sentCls=sentDir;
  const sentText=sentDir==='bullish'?'整体偏多':sentDir==='bearish'?'整体偏空':'多空分歧';
  const sentCol=sentDir==='bullish'?'#4caf72':sentDir==='bearish'?'#e05c5c':'#e0a23c';
  const actCls=a=>a==='strong-buy'?'buy':a==='strong-sell'?'sell':a;
  const actMap={'strong-buy':'强烈买入','buy':'买入','hold':'持有观望','sell':'卖出','strong-sell':'强烈卖出'};
  // 危机预警统计
  const crisisDanger=valid.filter(r=>r.crisis&&r.crisis.level==='danger').length;
  const crisisWarn=valid.filter(r=>r.crisis&&(r.crisis.level==='warn'||r.crisis.level==='watch')).length;
  let html='<div class="hf-hero"><h2>AI对冲基金决策引擎</h2>'+
    '<p>15位Agent · 5量化+10大师 · 危机预警 · 更新于 '+ts+'</p>'+
    '<div class="hf-actions"><button class="hf-btn" onclick="viewRendered.hedgefund=false;renderHedgeFund()">重新分析</button></div></div>'+
    '<div class="hf-summary">'+
    '<div class="hf-stat"><div class="num">'+valid.length+'</div><div class="lbl">分析标的</div></div>'+
    '<div class="hf-stat"><div class="num" style="color:#4caf72">'+(sb+by)+'</div><div class="lbl">看多(含'+sb+'强烈)</div></div>'+
    '<div class="hf-stat"><div class="num" style="color:#e0a23c">'+hd+'</div><div class="lbl">中性观望</div></div>'+
    '<div class="hf-stat"><div class="num" style="color:#e05c5c">'+sl+'</div><div class="lbl">看空</div></div></div>'+
    '<div class="hf-sentiment '+sentCls+'"><div class="dir" style="color:'+sentCol+'">'+sentText+'</div>'+
    '<div class="conf" style="color:'+sentCol+'">综合评分 '+avgScore+'</div></div>';
  // 危机预警总览
  if(crisisDanger>0||crisisWarn>0){
    const cLvl=crisisDanger>=3?'danger':crisisDanger>=1||crisisWarn>=5?'warn':'watch';
    const cIcon=cLvl==='danger'?'🔴':cLvl==='warn'?'🟡':'🔵';
    const cTitle=cLvl==='danger'?'系统性危机预警':cLvl==='warn'?'风险预警信号':'关注信号';
    const cDesc=cLvl==='danger'?'多只标的出现危机特征(参考2000/2008/1993/2022)，建议防御为主':cLvl==='warn'?'部分标的出现风险信号，建议关注并控制仓位':'部分指标偏离，持续观察';
    html+='<div class="hf-crisis-alert '+cLvl+'"><div class="ca-title">'+cIcon+' '+cTitle+' · '+crisisDanger+'危险 / '+crisisWarn+'警告</div>'+
      '<div style="color:var(--text-2);font-size:10px">'+cDesc+'</div></div>';
  }
  const sorted=[...valid].sort((a,b)=>{const o={'strong-buy':0,'buy':1,'hold':2,'sell':3,'strong-sell':4};return(o[a.decision.action]||2)-(o[b.decision.action]||2);});
  sorted.forEach(function(r){
    const d=r.decision,a=r.agents,rs=r.risk,cr=r.crisis;
    const pCls=r.priceChange>0?'up':r.priceChange<0?'down':'flat';
    const pStr=r.priceChange>=0?'+':'';
    // 实时价格显示
    const priceFmt=r.currentPrice!=null?r.currentPrice.toFixed(2):'—';

    // 卡片头部: 如果有危机预警则显示小图标
    const crisisIcon=cr&&cr.level==='danger'?'<span style="color:#e05c5c;font-size:10px;margin-left:4px">⚠危险</span>':cr&&(cr.level==='warn'||cr.level==='watch')?'<span style="color:#e0a23c;font-size:10px;margin-left:4px">⚠关注</span>':'';
    html+='<div class="hf-card '+actCls(d.action)+'" onclick="this.classList.toggle(\'expanded\')">'+

          html+='<div class="ca-item">'+icon+' '+s.msg+'</div>';
        });

      }
    } else {
      html+='<div class="hf-section-title">K线数据暂时不可用</div><div style="color:var(--text-3);font-size:11px;padding:8px 0">无法进行完整分析，仅显示实时行情</div>';

  });
  html+='<div class="hf-disclaimer"><b>风险提示</b>: 基于ai-hedge-fund多Agent决策架构,15个并行分析Agent经波动率风控调整后输出交易指令。危机预警参考2000互联网泡沫、2008金融危机、1993利率冲击、2022加息周期等历史特征。所有分析基于历史技术面与公开基本面,仅供研究参考,不构成投资建议。市场有风险,投资需谨慎。</div>';
